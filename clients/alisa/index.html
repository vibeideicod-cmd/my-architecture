<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
  }

  body {
    font-family: 'Montserrat', -apple-system, sans-serif;
    color: #2d2142;
    background:
      radial-gradient(ellipse at 20% 15%, #d7c4ea 0%, transparent 55%),
      radial-gradient(ellipse at 80% 85%, #9b84c4 0%, transparent 55%),
      linear-gradient(135deg, #b8a4d4 0%, #8a7ab8 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 5vw, 60px);
    overflow-x: hidden;
  }

  /* мягкие светящиеся пятна на фоне */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 400px; height: 400px;
    background: rgba(255, 220, 180, 0.25);
    top: -100px; left: -100px;
    animation: float1 12s ease-in-out infinite;
  }
  body::after {
    width: 500px; height: 500px;
    background: rgba(180, 150, 220, 0.3);
    bottom: -150px; right: -150px;
    animation: float2 14s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(40px, 30px); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-30px, -40px); }
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-radius: 32px;
    padding: clamp(32px, 6vw, 56px) clamp(24px, 5vw, 48px);
    text-align: center;
    box-shadow:
      0 20px 60px rgba(60, 40, 100, 0.25),
      0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    animation: cardIn 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.2) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .photo-wrap {
    width: clamp(140px, 35vw, 180px);
    height: clamp(140px, 35vw, 180px);
    margin: 0 auto clamp(20px, 4vw, 28px);
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(135deg, #fff 0%, #e8d5ff 50%, #b89ce0 100%);
    box-shadow:
      0 10px 30px rgba(90, 50, 140, 0.3),
      0 0 40px rgba(255, 220, 180, 0.4);
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 10px 30px rgba(90, 50, 140, 0.3), 0 0 40px rgba(255, 220, 180, 0.4); }
    50% { box-shadow: 0 15px 40px rgba(90, 50, 140, 0.4), 0 0 60px rgba(255, 220, 180, 0.6); }
  }

  .photo-wrap img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  /* запасной плейсхолдер, если фото не загрузилось */
  .photo-wrap .fallback {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9b3e6, #8a6bb0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 10vw, 56px);
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 6.5vw, 42px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fff 0%, #ffe8c4 40%, #ffd9a8 60%, #fff 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px rgba(255, 220, 180, 0.6))
            drop-shadow(0 2px 6px rgba(60, 30, 90, 0.3));
    animation: shimmer 5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .tagline {
    font-size: clamp(14px, 3.5vw, 16px);
    font-weight: 400;
    color: #f4ecff;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: clamp(24px, 5vw, 32px);
    opacity: 0.95;
  }

  .tagline .sep {
    display: inline-block;
    width: 24px;
    height: 1px;
    background: rgba(255,255,255,0.6);
    vertical-align: middle;
    margin: 0 10px;
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: clamp(14px, 4vw, 20px);
    margin-bottom: clamp(26px, 5vw, 34px);
  }

  .social {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-decoration: none;
    transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.3);
    backdrop-filter: blur(10px);
  }

  .social svg {
    width: 24px;
    height: 24px;
    transition: transform 0.35s ease;
  }

  .social:hover {
    transform: translateY(-6px) scale(1.08);
    background: linear-gradient(135deg, #fff 0%, #ffe8c4 100%);
    color: #6b4a9a;
    box-shadow: 0 10px 25px rgba(60, 30, 90, 0.35),
                0 0 20px rgba(255, 220, 180, 0.5);
  }

  .social:hover svg {
    transform: scale(1.15);
  }

  .social.disabled {
    cursor: not-allowed;
    opacity: 0.7;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 36px;
    border-radius: 50px;
    background: linear-gradient(135deg, #ffd9a8 0%, #ffb97a 50%, #ff9556 100%);
    color: #4a2a6b;
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(15px, 3.8vw, 17px);
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.02em;
    box-shadow:
      0 10px 25px rgba(255, 140, 80, 0.35),
      0 0 0 0 rgba(255, 200, 140, 0.7);
    transition: all 0.35s ease;
    animation: pulse 2.5s ease-in-out infinite;
    position: relative;
    overflow: hidden;
  }

  .cta::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    transition: left 0.6s ease;
  }

  .cta:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(255, 140, 80, 0.5);
    animation-play-state: paused;
  }

  .cta:hover::before {
    left: 100%;
  }

  .cta svg {
    width: 20px;
    height: 20px;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 10px 25px rgba(255, 140, 80, 0.35), 0 0 0 0 rgba(255, 200, 140, 0.7); }
    50% { box-shadow: 0 10px 25px rgba(255, 140, 80, 0.35), 0 0 0 14px rgba(255, 200, 140, 0); }
  }

  .footer-note {
    margin-top: clamp(22px, 4vw, 28px);
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
  }

  @media (max-width: 380px) {
    .card { padding: 28px 20px; border-radius: 24px; }
    .social { width: 46px; height: 46px; }
    .social svg { width: 21px; height: 21px; }
    .cta { padding: 14px 28px; }
  }
</style>
</head>

      <img src="alisa.jpg" alt="Алиса Лукьянович"

    <h1>Алиса<br>Лукьянович</h1>
