<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Мастер-группа</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #ffffff;
    --bg-warm:    #d3bfb1;
    --bg-cool:    #cbcbd4;
    --gold:       #d4af37;
    --mustard:    #c99700;
    --green:      #4b7850;
    --green-deep: #103206;
    --text:       #4c4651;
    --text-soft:  rgba(76, 70, 81, 0.62);
    --text-hint:  rgba(76, 70, 81, 0.45);
    --yellow:     #ffc403;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html,body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.6; }
  body { min-height: 100vh; padding: 0 clamp(16px, 4vw, 48px); }
  .wrap { max-width: 780px; margin: 0 auto; padding: clamp(32px, 6vw, 72px) 0 80px; }

  .status { padding: 60px 20px; text-align: center; color: var(--text-soft); }
  .err { color: var(--green-deep); background: var(--bg-warm); border: 1px solid var(--mustard); padding: 20px 24px; border-radius: 12px; margin: 40px 0; }

  .hero { text-align: center; margin-bottom: 48px; }
  .hero__avatar { width: 128px; height: 128px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--mustard)); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 52px; color: #fff; margin: 0 auto 22px; font-weight: 700; box-shadow: 0 12px 34px rgba(212, 175, 55, 0.3); border: 3px solid #fff; }
  .hero__name { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 48px); line-height: 1.1; margin-bottom: 12px; color: var(--green-deep); }
  .hero__niche { color: var(--mustard); font-weight: 700; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 2.5px; }
  .hero__city { color: var(--text-soft); font-size: 14px; }
  .hero__bio { margin-top: 26px; color: var(--text); font-size: 16px; max-width: 620px; margin-left: auto; margin-right: auto; line-height: 1.7; }

  .divider { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 40px auto; }

  .section { background: var(--bg-warm); border: 1px solid rgba(212, 175, 55, 0.25); border-radius: 20px; padding: clamp(26px, 4vw, 44px); margin-bottom: 20px; }
  .section.alt { background: #fff; border-color: var(--bg-warm); }
  .section__label { display: inline-block; color: var(--mustard); font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 14px; }
  .section__title { font-family: 'Playfair Display', serif; font-size: clamp(24px, 3.5vw, 32px); margin-bottom: 12px; line-height: 1.2; color: var(--green-deep); }
  .section__tagline { color: var(--green); font-size: 17px; margin-bottom: 18px; font-style: italic; font-family: 'Playfair Display', serif; }
  .section__body { color: var(--text); font-size: 15px; white-space: pre-line; line-height: 1.75; }

  .meta { display: flex; flex-wrap: wrap; gap: 12px; margin: 28px 0 0; }
  .meta__item { background: #fff; border: 1px solid var(--bg-warm); border-radius: 12px; padding: 14px 18px; flex: 1; min-width: 140px; }
  .meta__label { color: var(--text-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 600; }
  .meta__value { color: var(--green-deep); font-weight: 700; font-size: 14px; }

  .who { color: var(--text); font-size: 15px; background: #fff; border-left: 4px solid var(--green); padding: 20px 24px; border-radius: 0 10px 10px 0; margin-top: 14px; line-height: 1.7; }

  .form { display: grid; gap: 12px; margin-top: 22px; }
  .form input, .form textarea { background: #fff; border: 1px solid var(--bg-warm); color: var(--text); padding: 15px 18px; border-radius: 12px; font: inherit; font-size: 15px; transition: border-color .2s, box-shadow .2s; }
  .form input::placeholder, .form textarea::placeholder { color: var(--text-hint); }
  .form input:focus, .form textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15); }
  .form button { background: linear-gradient(135deg, var(--gold) 0%, var(--mustard) 100%); color: #fff; border: 0; padding: 17px 28px; border-radius: 50px; font: inherit; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: transform .15s, box-shadow .2s; box-shadow: 0 6px 22px rgba(212, 175, 55, 0.35); }
  .form button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.45); }
  .form button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
  .form__hint { color: var(--text-soft); font-size: 13px; margin-top: 6px; text-align: center; }

  .success { text-align: center; padding: 40px 20px; }
  .success__emoji { font-size: 68px; margin-bottom: 18px; }
  .success__title { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 14px; color: var(--green); }
  .success__text { color: var(--text); font-size: 16px; line-height: 1.7; }

  .footer { text-align: center; color: var(--text-soft); font-size: 12px; margin-top: 56px; letter-spacing: 1px; }
  .footer a { color: var(--mustard); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">
  <div id="root"><div class="status">Загружаем...</div></div>
  <div class="footer">
    Платформа <a href="./">Нейро Бабки СССР · мастер-группы</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://qwoepdibvmwqgkkaabba.supabase.co';
const SB_KEY = 'sb_publishable_cbbjRN4EskeHOHy6pSCYLg_RCSH32fY';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const root = document.getElementById('root');
const params = new URLSearchParams(location.search);
const masterId = params.get('m');

function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function load() {
  if (!masterId) {
    root.innerHTML = '<div class="err">В ссылке не указан мастер. Ожидается <code>?m=slug</code></div>';
    return;
  }
  const { data: m, error } = await sb.from('mg_masters').select('*').eq('id', masterId).maybeSingle();
  if (error) { root.innerHTML = `<div class="err">Ошибка загрузки: ${esc(error.message)}</div>`; return; }
  if (!m) { root.innerHTML = `<div class="err">Мастер <b>${esc(masterId)}</b> не найден.</div>`; return; }
  render(m);
}

function render(m) {
  const initial = (m.name || '?').trim()[0] || '?';
  document.title = `${m.name} — мастер-группа`;

  const startDate = m.start_date ? new Date(m.start_date).toLocaleDateString('ru-RU', { day:'numeric', month:'long' }) : '—';
  const duration = `${m.weeks || 5} недель`;
  const rhythm = m.meetings_per_week ? `${m.meetings_per_week} встречи в неделю` : '—';

  root.innerHTML = `
    <div class="hero">
      ${m.photo_url
        ? `<img src="${esc(m.photo_url)}" alt="" style="width:128px;height:128px;border-radius:50%;object-fit:cover;margin-bottom:22px;box-shadow:0 12px 34px rgba(76,70,81,0.15);border:3px solid #fff">`
        : `<div class="hero__avatar">${esc(initial)}</div>`}
      <h1 class="hero__name">${esc(m.name)}</h1>
      ${m.niche ? `<div class="hero__niche">${esc(m.niche)}</div>` : ''}
      ${m.city ? `<div class="hero__city">${esc(m.city)}</div>` : ''}
      ${m.bio ? `<p class="hero__bio">${esc(m.bio)}</p>` : ''}
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section__label">Программа</div>
      <h2 class="section__title">${esc(m.program_title)}</h2>
      ${m.program_tagline ? `<div class="section__tagline">${esc(m.program_tagline)}</div>` : ''}
      ${m.program_desc ? `<p class="section__body">${esc(m.program_desc)}</p>` : ''}

      <div class="meta">
        <div class="meta__item"><div class="meta__label">Длительность</div><div class="meta__value">${esc(duration)}</div></div>
        <div class="meta__item"><div class="meta__label">Ритм</div><div class="meta__value">${esc(rhythm)}</div></div>
        <div class="meta__item"><div class="meta__label">Старт</div><div class="meta__value">${esc(startDate)}</div></div>
        ${m.format ? `<div class="meta__item"><div class="meta__label">Формат</div><div class="meta__value">${esc(m.format)}</div></div>` : ''}
      </div>
    </div>

    ${m.what_you_get ? `
    <div class="section alt">
      <div class="section__label">Что ты получишь</div>
      <p class="section__body">${esc(m.what_you_get)}</p>
    </div>` : ''}

    ${m.who_for ? `
    <div class="section">
      <div class="section__label">Кому подойдёт</div>
      <div class="who">${esc(m.who_for)}</div>
    </div>` : ''}

    <div class="section alt" id="signup">
      <div class="section__label">Записаться</div>
      <h3 class="section__title" style="font-size:26px">Хочу в группу</h3>
      <form class="form" id="form">
        <input name="name" required placeholder="Как тебя зовут?" />
        <input name="contact" placeholder="Email или Telegram — как с тобой связаться" />
        <button type="submit" id="submit">Записаться в группу</button>
        <div class="form__hint">Мастер увидит тебя в своём кабинете сразу.</div>
      </form>
      <div id="result"></div>
    </div>
  `;

  const form = document.getElementById('form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit');
    btn.disabled = true; btn.textContent = 'Записываем...';
    const fd = new FormData(form);
    const { error } = await sb.from('mg_participants').insert({
      master_id: masterId,
      name: fd.get('name'),
      contact: fd.get('contact') || null,
    });
    if (error) {
      document.getElementById('result').innerHTML = `<div class="err">Не записалось: ${esc(error.message)}</div>`;
      btn.disabled = false; btn.textContent = 'Попробовать ещё раз';
      return;
    }
    form.style.display = 'none';
    document.getElementById('result').innerHTML = `
      <div class="success">
        <div class="success__emoji">🌿</div>
        <div class="success__title">Ты в группе!</div>
        <p class="success__text">${esc(m.name)} сейчас увидит запись в своём кабинете. Скоро пришлём ссылку на первую встречу.</p>
      </div>`;
  });
}

load();
</script>
</body>
</html>
