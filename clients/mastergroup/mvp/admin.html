<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Админ-панель · мастер-группы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #ffffff;
    --bg-warm:    #d3bfb1;
    --bg-cool:    #cbcbd4;
    --gold:       #d4af37;
    --mustard:    #c99700;
    --green:      #4b7850;
    --green-deep: #103206;
    --text:       #4c4651;
    --text-soft:  rgba(76, 70, 81, 0.62);
    --text-hint:  rgba(76, 70, 81, 0.45);
    --yellow:     #ffc403;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html,body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.6; min-height: 100vh; }
  body { padding: 0 clamp(16px, 3vw, 32px); }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 32px 0 80px; }

  /* Gate */
  .gate { max-width: 440px; margin: 120px auto 0; background: var(--bg-warm); border-radius: 20px; padding: 44px 40px; text-align: center; }
  .gate h1 { font-family: 'Playfair Display', serif; font-size: 30px; margin-bottom: 14px; color: var(--green-deep); }
  .gate p { color: var(--text); font-size: 14px; margin-bottom: 24px; }
  .gate input { width: 100%; background: #fff; border: 1px solid rgba(76,70,81,0.15); color: var(--text); padding: 15px 18px; border-radius: 12px; font: inherit; font-size: 15px; margin-bottom: 14px; }
  .gate input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }
  .gate button { width: 100%; background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; border: 0; padding: 15px; border-radius: 50px; font: inherit; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1.2px; font-size: 13px; }
  .gate .err { color: var(--green-deep); margin-top: 14px; font-size: 13px; font-weight: 600; }

  /* Header */
  .hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; padding-bottom: 24px; border-bottom: 1px solid var(--bg-warm); }
  .hdr h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 4vw, 40px); color: var(--green-deep); line-height: 1.1; }
  .hdr__sub { color: var(--text-soft); font-size: 14px; margin-top: 6px; }
  .logout { background: transparent; border: 0; color: var(--text-soft); cursor: pointer; font: inherit; font-size: 13px; font-weight: 600; }
  .logout:hover { color: var(--mustard); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat { background: var(--bg-warm); border-radius: 16px; padding: 24px; }
  .stat__n { font-family: 'Playfair Display', serif; font-size: 44px; color: var(--green-deep); line-height: 1; font-weight: 700; }
  .stat__l { color: var(--text-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; margin-top: 8px; font-weight: 700; }
  .stat.highlight { background: #fff9e6; border: 2px solid var(--gold); }
  .stat.highlight .stat__n { color: var(--mustard); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--bg-warm); border-radius: 50px; padding: 6px; margin-bottom: 24px; overflow-x: auto; }
  .tab { flex: 1; min-width: max-content; background: transparent; border: 0; color: var(--text); padding: 13px 24px; border-radius: 50px; font: inherit; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all .2s; }
  .tab:hover { color: var(--green-deep); }
  .tab.on { background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; box-shadow: 0 4px 14px rgba(212,175,55,0.3); }

  .pane { display: none; }
  .pane.on { display: block; }

  h2 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 16px; color: var(--green-deep); }
  .pane-desc { color: var(--text-soft); font-size: 14px; margin-bottom: 20px; }

  /* Application card */
  .app { background: #fff; border: 1px solid var(--bg-warm); border-radius: 18px; padding: 24px; margin-bottom: 14px; transition: border-color .2s, box-shadow .2s; }
  .app:hover { border-color: var(--gold); box-shadow: 0 6px 20px rgba(212,175,55,0.1); }
  .app.new { animation: flash 2s ease-out; }
  @keyframes flash {
    0% { background: #fff9e6; border-color: var(--yellow); }
    100% { background: #fff; border-color: var(--bg-warm); }
  }
  .app__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .app__name { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--green-deep); }
  .app__number { font-size: 11px; color: var(--text-soft); font-family: monospace; }
  .app__niche { color: var(--mustard); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 2px; }
  .app__meta { display: flex; gap: 12px; flex-wrap: wrap; color: var(--text-soft); font-size: 12px; margin-top: 4px; }
  .app__body { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--bg-warm); display: grid; gap: 12px; }
  .app__field { font-size: 14px; color: var(--text); }
  .app__field b { color: var(--green-deep); display: block; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .app__actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
  .btn { padding: 11px 20px; border-radius: 50px; font: inherit; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer; border: 0; transition: all .15s; }
  .btn-approve { background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; box-shadow: 0 4px 14px rgba(212,175,55,0.3); }
  .btn-approve:hover { transform: translateY(-1px); }
  .btn-reject { background: #fff; border: 1px solid var(--bg-warm); color: var(--text-soft); }
  .btn-reject:hover { border-color: var(--green-deep); color: var(--green-deep); }
  .btn-ghost { background: transparent; border: 1px solid var(--gold); color: var(--mustard); }
  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .status-submitted { background: var(--yellow); color: var(--green-deep); }
  .status-approved { background: var(--green); color: #fff; }
  .status-rejected { background: var(--bg-cool); color: var(--text); }

  .moderation-note { margin-top: 12px; }
  .moderation-note textarea { width: 100%; background: var(--bg-warm); border: 1px solid rgba(76,70,81,0.15); padding: 12px 14px; border-radius: 10px; font: inherit; font-size: 13px; resize: vertical; min-height: 60px; color: var(--text); }

  /* Master page card */
  .mp { background: #fff; border: 1px solid var(--bg-warm); border-radius: 16px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; }
  .mp:hover { border-color: var(--gold); }
  .mp__name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--green-deep); }
  .mp__meta { color: var(--text-soft); font-size: 12px; margin-top: 3px; }
  .mp__actions { display: flex; gap: 8px; }

  .empty { text-align: center; color: var(--text-soft); padding: 50px 20px; font-size: 14px; background: var(--bg-warm); border-radius: 16px; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(76,70,81,0.4); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-backdrop.on { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 36px; max-width: 540px; width: 100%; }
  .modal h2 { margin-bottom: 12px; }
  .modal p { color: var(--text); font-size: 14px; margin-bottom: 18px; }
  .modal__url { background: var(--bg-warm); padding: 14px 18px; border-radius: 12px; font-family: monospace; font-size: 13px; word-break: break-all; user-select: all; cursor: pointer; color: var(--green-deep); font-weight: 600; margin-bottom: 16px; }
  .modal__actions { display: flex; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="gate" id="gate">
    <h1>Админ-панель</h1>
    <p>Закрытая зона Инны. Введи ключ доступа.</p>
    <input type="password" id="pwd" placeholder="Ключ" autofocus />
    <button id="enter">Войти</button>
    <div class="err" id="gateErr" style="display:none"></div>
  </div>
  <div id="main" style="display:none"></div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://qwoepdibvmwqgkkaabba.supabase.co';
const SB_KEY = 'sb_publishable_cbbjRN4EskeHOHy6pSCYLg_RCSH32fY';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const ADMIN_HASH = 'a5b4f151eae19e3decba7a00c66c1d487062791e3deb0d690594ad7923fac6a5';
const LS_KEY = 'mg-admin-pwd';

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtTime(s){if(!s)return'—';const d=new Date(s);return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
async function sha256(str){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

let adminPwd = null;
let appsData = [];
let pagesData = [];
let v1Data = { masters: [], parts: [], cases: [], msgs: [] };

// ── GATE ─────────────────────────────────────────────────
document.getElementById('enter').addEventListener('click', async () => {
  const pwd = document.getElementById('pwd').value;
  const h = await sha256(pwd);
  if (h !== ADMIN_HASH) {
    const err = document.getElementById('gateErr');
    err.textContent = 'Неверный ключ';
    err.style.display = 'block';
    return;
  }
  adminPwd = pwd;
  sessionStorage.setItem(LS_KEY, pwd);
  show();
});
document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('enter').click();
});

if (sessionStorage.getItem(LS_KEY)) {
  adminPwd = sessionStorage.getItem(LS_KEY);
  show();
}

// ── MAIN ─────────────────────────────────────────────────
async function show() {
  document.getElementById('gate').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';
  main.innerHTML = '<div class="hdr"><h1>Загружаем...</h1></div>';

  await loadAll();
  renderShell();
  subscribeRealtime();
}

async function loadAll() {
  // Анкеты через RPC
  const apps = await sb.rpc('mg_admin_list_applications', { admin_secret: adminPwd });
  appsData = apps.data || [];
  if (apps.error) { console.error('apps error:', apps.error); }

  // Собранные страницы через RPC
  const pages = await sb.rpc('mg_admin_list_pages', { admin_secret: adminPwd });
  pagesData = pages.data || [];
  if (pages.error) { console.error('pages error:', pages.error); }

  // V1 данные (совместимость)
  const [m, p, c, ms] = await Promise.all([
    sb.from('mg_masters').select('*').order('created_at'),
    sb.from('mg_participants').select('*').order('created_at', { ascending: false }),
    sb.from('mg_cases').select('*'),
    sb.from('mg_messages').select('id,master_id'),
  ]);
  v1Data = {
    masters: m.data || [],
    parts: p.data || [],
    cases: c.data || [],
    msgs: ms.data || [],
  };
}

function renderShell() {
  const submittedCount = appsData.filter(a => a.status === 'submitted' || a.status === 'under_review').length;
  const approvedCount = appsData.filter(a => a.status === 'approved').length;
  const publishedCount = pagesData.filter(p => p.published).length;

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="hdr">
      <div>
        <h1>МГ · админ-панель</h1>
        <div class="hdr__sub">Нейро Бабки СССР · модерация анкет и страниц</div>
      </div>
      <button class="logout" id="logout">Выйти</button>
    </div>

    <div class="stats">
      <div class="stat ${submittedCount > 0 ? 'highlight' : ''}">
        <div class="stat__n">${submittedCount}</div>
        <div class="stat__l">Новых анкет</div>
      </div>
      <div class="stat">
        <div class="stat__n">${approvedCount}</div>
        <div class="stat__l">Одобрено</div>
      </div>
      <div class="stat">
        <div class="stat__n">${publishedCount}</div>
        <div class="stat__l">Опубликовано</div>
      </div>
      <div class="stat">
        <div class="stat__n">${v1Data.parts.length}</div>
        <div class="stat__l">Участников v1</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab on" data-p="pane-apps">🆕 Анкеты ${submittedCount > 0 ? `(${submittedCount})` : ''}</button>
      <button class="tab" data-p="pane-pages">📄 Собранные страницы</button>
      <button class="tab" data-p="pane-v1">👥 v1 Legacy</button>
    </div>

    <div class="pane on" id="pane-apps">
      <h2>Очередь анкет</h2>
      <p class="pane-desc">Новые анкеты появляются в реальном времени. Одобрение создаёт страницу мастера и возвращает ссылку на конструктор — ты отправляешь её мастеру в Telegram.</p>
      <div id="appsList"></div>
    </div>

    <div class="pane" id="pane-pages">
      <h2>Собранные страницы</h2>
      <p class="pane-desc">Все страницы одобренных мастеров — опубликованные и в работе.</p>
      <div id="pagesList"></div>
    </div>

    <div class="pane" id="pane-v1">
      <h2>v1 Legacy (мастера старой версии)</h2>
      <p class="pane-desc">Первая версия МГ-платформы. Остаётся для обратной совместимости.</p>
      <div id="v1List"></div>
    </div>
  `;

  main.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    main.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    main.querySelectorAll('.pane').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    main.querySelector('#' + t.dataset.p).classList.add('on');
  }));

  document.getElementById('logout').addEventListener('click', () => {
    sessionStorage.removeItem(LS_KEY);
    location.reload();
  });

  renderApps();
  renderPages();
  renderV1();
}

function renderApps() {
  const el = document.getElementById('appsList');
  // Сначала submitted, потом под review, потом approved, потом rejected
  const order = { 'submitted': 0, 'under_review': 1, 'approved': 2, 'rejected': 3 };
  const sorted = [...appsData].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9) || new Date(b.created_at) - new Date(a.created_at));

  if (!sorted.length) {
    el.innerHTML = '<div class="empty">Пока анкет нет. Когда кто-то заполнит форму на apply.html — появится здесь в реальном времени.</div>';
    return;
  }

  el.innerHTML = sorted.map(a => renderAppCard(a)).join('');

  // Bind expanders и кнопки
  el.querySelectorAll('.app').forEach(card => {
    const id = +card.dataset.id;
    const body = card.querySelector('.app__body');
    card.querySelector('.app__top').addEventListener('click', () => {
      body.style.display = body.style.display === 'none' ? 'grid' : 'none';
    });
    const approveBtn = card.querySelector('.btn-approve');
    const rejectBtn = card.querySelector('.btn-reject');
    if (approveBtn) approveBtn.addEventListener('click', (e) => { e.stopPropagation(); moderate(id, 'approved', card); });
    if (rejectBtn) rejectBtn.addEventListener('click', (e) => { e.stopPropagation(); moderate(id, 'rejected', card); });
  });
}

function renderAppCard(a) {
  const canModerate = a.status === 'submitted' || a.status === 'under_review';
  const statusCls = `status-${a.status}`;
  const statusText = { submitted: 'Новая', under_review: 'На рассмотрении', approved: 'Одобрена', rejected: 'Отклонена' }[a.status] || a.status;
  const newCls = canModerate ? 'new' : '';

  return `
    <div class="app ${newCls}" data-id="${a.id}">
      <div class="app__top" style="cursor:pointer">
        <div>
          <div class="app__name">${esc(a.full_name)}</div>
          <div class="app__niche">${esc(a.niche || '—')}</div>
          <div class="app__meta">
            <span>№ Мастер ${a.master_number}</span>
            <span>${esc(a.city || '—')}</span>
            <span>${esc(fmtTime(a.created_at))}</span>
          </div>
        </div>
        <span class="status-badge ${statusCls}">${statusText}</span>
      </div>
      <div class="app__body">
        <div class="app__field"><b>Контакт</b>${esc(a.contact)}</div>
        ${a.business_desc ? `<div class="app__field"><b>Бизнес</b>${esc(a.business_desc)}</div>` : ''}
        ${a.mg_context ? `<div class="app__field"><b>В мастер-группе</b>${esc(a.mg_context)}</div>` : ''}
        ${a.goal ? `<div class="app__field"><b>Хочет получить</b>${esc(a.goal)}</div>` : ''}
        ${a.experience ? `<div class="app__field"><b>Опыт</b>${esc(a.experience)}</div>` : ''}
        ${a.moderation_note ? `<div class="app__field"><b>Твой комментарий</b>${esc(a.moderation_note)}</div>` : ''}

        ${canModerate ? `
          <div class="moderation-note">
            <textarea class="note-input" placeholder="Комментарий к решению (необязательно)"></textarea>
          </div>
          <div class="app__actions">
            <button class="btn btn-approve">✅ Одобрить</button>
            <button class="btn btn-reject">Отклонить</button>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

async function moderate(appId, newStatus, cardEl) {
  const note = cardEl.querySelector('.note-input')?.value || '';
  const confirmMsg = newStatus === 'approved'
    ? 'Одобрить анкету? Будет создана страница мастера и сгенерирован токен конструктора — его нужно будет отправить мастеру.'
    : 'Отклонить анкету?';
  if (!confirm(confirmMsg)) return;

  const { data, error } = await sb.rpc('mg_moderate', {
    app_id: appId,
    new_status: newStatus,
    note: note,
    admin_secret: adminPwd,
  });

  if (error) { alert('Ошибка: ' + error.message); return; }

  if (newStatus === 'approved') {
    showApprovedModal(data, appsData.find(a => a.id === appId));
  }

  await loadAll();
  renderShell();
}

function showApprovedModal(data, app) {
  const slug = data.slug;
  const token = data.master_token;
  const buildUrl = new URL('build.html', location.href);
  buildUrl.searchParams.set('m', slug);
  buildUrl.searchParams.set('t', token);
  const fullUrl = buildUrl.href;

  const firstName = (app?.full_name || '').split(' ')[0] || 'Мастер';
  const tgMessage = `Привет, ${firstName}! Твоя анкета на МГ-платформу одобрена 🎉\n\nВот ссылка на конструктор твоей страницы:\n${fullUrl}\n\nУ тебя 8 коротких вопросов — примерно 20 минут работы. Сохрани ссылку — она секретная, доступ только у тебя.\n\nКак заполнишь и опубликуешь — пришлю тебе твою живую ссылку :)`;

  const modal = document.getElementById('modal');
  const backdrop = document.getElementById('modalBackdrop');

  modal.innerHTML = `
    <h2>✅ Анкета одобрена</h2>
    <p><strong>${esc(firstName)}</strong> — Мастер ${data.master_number}. Страница создана. Теперь отправь мастеру эту ссылку на конструктор — токен доступа внутри неё:</p>
    <div class="modal__url">${esc(fullUrl)}</div>
    <div class="modal__actions">
      <button class="btn btn-approve" id="copyMsgBtn">📋 Скопировать готовое сообщение для Telegram</button>
      <button class="btn btn-ghost" id="copyUrlBtn">Только ссылку</button>
      <button class="btn btn-reject" id="closeBtn">Закрыть</button>
    </div>
    <p style="margin-top:14px;font-size:12px;color:var(--text-soft)">⚠️ Эта ссылка показывается ОДИН РАЗ. Мастер-токен не сохраняется в админке. Если потеряешь — надо будет генерить новую.</p>
  `;

  backdrop.classList.add('on');

  document.getElementById('copyMsgBtn').addEventListener('click', (e) => {
    navigator.clipboard.writeText(tgMessage).then(() => {
      e.target.textContent = '✓ Скопировано! Вставь мастеру в Telegram';
    });
  });
  document.getElementById('copyUrlBtn').addEventListener('click', (e) => {
    navigator.clipboard.writeText(fullUrl).then(() => {
      e.target.textContent = '✓ Ссылка скопирована';
    });
  });
  document.getElementById('closeBtn').addEventListener('click', () => {
    backdrop.classList.remove('on');
  });
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) backdrop.classList.remove('on');
  });
}

function renderPages() {
  const el = document.getElementById('pagesList');
  if (!pagesData.length) {
    el.innerHTML = '<div class="empty">Пока нет собранных страниц. Как одобришь первую анкету и мастер пройдёт конструктор — появится здесь.</div>';
    return;
  }
  el.innerHTML = pagesData.map(p => {
    const pageUrl = new URL('master-page.html', location.href);
    pageUrl.searchParams.set('m', p.slug);
    const previewUrl = new URL(pageUrl);
    previewUrl.searchParams.set('preview', '1');
    return `
      <div class="mp">
        <div>
          <div class="mp__name">${esc(p.display_name || p.full_name || 'Без имени')}</div>
          <div class="mp__meta">
            ${p.published ? '✅ Опубликовано' : '📝 Черновик'} ·
            Мастер ${p.master_number} ·
            ${esc(p.niche || '—')} ·
            Обновлено ${esc(fmtTime(p.updated_at))}
          </div>
        </div>
        <div class="mp__actions">
          ${p.published
            ? `<a class="btn btn-approve" href="${pageUrl.href}" target="_blank">Открыть</a>`
            : `<a class="btn btn-ghost" href="${previewUrl.href}" target="_blank">Превью</a>`
          }
        </div>
      </div>
    `;
  }).join('');
}

function renderV1() {
  const el = document.getElementById('v1List');
  const by = (arr, mid) => arr.filter(x => x.master_id === mid);
  if (!v1Data.masters.length) { el.innerHTML = '<div class="empty">Мастеров v1 нет</div>'; return; }
  el.innerHTML = v1Data.masters.map(m => {
    const mp = by(v1Data.parts, m.id);
    return `
      <div class="mp">
        <div>
          <div class="mp__name">${esc(m.name)}</div>
          <div class="mp__meta">${esc(m.niche || '')} · ${mp.length} участников · ${by(v1Data.cases, m.id).length} кейсов</div>
        </div>
        <div class="mp__actions">
          <a class="btn btn-ghost" href="vitrina.html?m=${esc(m.id)}" target="_blank">Витрина v1</a>
        </div>
      </div>
    `;
  }).join('');
}

function subscribeRealtime() {
  sb.channel('mg-admin-apps')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mg_applications' },
      async () => { await loadAll(); renderShell(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'mg_applications' },
      async () => { await loadAll(); renderShell(); })
    .subscribe();
}
</script>
