<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Админ-панель · мастер-группы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #ffffff;
    --bg-warm:    #d3bfb1;
    --bg-cool:    #cbcbd4;
    --gold:       #d4af37;
    --mustard:    #c99700;
    --green:      #4b7850;
    --green-deep: #103206;
    --text:       #4c4651;
    --text-soft:  rgba(76, 70, 81, 0.62);
    --text-hint:  rgba(76, 70, 81, 0.45);
    --yellow:     #ffc403;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html,body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.6; min-height: 100vh; }
  body { padding: 0 clamp(16px, 3vw, 32px); }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 32px 0 80px; }

  /* Gate */
  .gate { max-width: 440px; margin: 120px auto 0; background: var(--bg-warm); border-radius: 20px; padding: 44px 40px; text-align: center; }
  .gate h1 { font-family: 'Playfair Display', serif; font-size: 30px; margin-bottom: 14px; color: var(--green-deep); }
  .gate p { color: var(--text); font-size: 14px; margin-bottom: 24px; }
  .gate input { width: 100%; background: #fff; border: 1px solid rgba(76,70,81,0.15); color: var(--text); padding: 15px 18px; border-radius: 12px; font: inherit; font-size: 15px; margin-bottom: 14px; }
  .gate input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }
  .gate button { width: 100%; background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; border: 0; padding: 15px; border-radius: 50px; font: inherit; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1.2px; font-size: 13px; }
  .gate .err { color: var(--green-deep); margin-top: 14px; font-size: 13px; font-weight: 600; }

  /* Header */
  .hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; padding-bottom: 24px; border-bottom: 1px solid var(--bg-warm); }
  .hdr h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 4vw, 40px); color: var(--green-deep); line-height: 1.1; }
  .hdr__sub { color: var(--text-soft); font-size: 14px; margin-top: 6px; }
  .logout { background: transparent; border: 0; color: var(--text-soft); cursor: pointer; font: inherit; font-size: 13px; font-weight: 600; }
  .logout:hover { color: var(--mustard); }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat { background: var(--bg-warm); border-radius: 16px; padding: 24px; }
  .stat__n { font-family: 'Playfair Display', serif; font-size: 44px; color: var(--green-deep); line-height: 1; font-weight: 700; }
  .stat__l { color: var(--text-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; margin-top: 8px; font-weight: 700; }
  .stat.highlight { background: #fff9e6; border: 2px solid var(--gold); }
  .stat.highlight .stat__n { color: var(--mustard); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; background: var(--bg-warm); border-radius: 50px; padding: 6px; margin-bottom: 24px; overflow-x: auto; }
  .tab { flex: 1; min-width: max-content; background: transparent; border: 0; color: var(--text); padding: 13px 24px; border-radius: 50px; font: inherit; font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all .2s; }
  .tab:hover { color: var(--green-deep); }
  .tab.on { background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; box-shadow: 0 4px 14px rgba(212,175,55,0.3); }

  .pane { display: none; }
  .pane.on { display: block; }

  h2 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 16px; color: var(--green-deep); }
  .pane-desc { color: var(--text-soft); font-size: 14px; margin-bottom: 20px; }

  /* Application card */
  .app { background: #fff; border: 1px solid var(--bg-warm); border-radius: 18px; padding: 24px; margin-bottom: 14px; transition: border-color .2s, box-shadow .2s; }
  .app:hover { border-color: var(--gold); box-shadow: 0 6px 20px rgba(212,175,55,0.1); }
  .app.new { animation: flash 2s ease-out; }
  @keyframes flash {
    0% { background: #fff9e6; border-color: var(--yellow); }
    100% { background: #fff; border-color: var(--bg-warm); }
  }
  .app__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .app__name { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--green-deep); }
  .app__number { font-size: 11px; color: var(--text-soft); font-family: monospace; }
  .app__niche { color: var(--mustard); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 2px; }
  .app__meta { display: flex; gap: 12px; flex-wrap: wrap; color: var(--text-soft); font-size: 12px; margin-top: 4px; }
  .app__body { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--bg-warm); display: grid; gap: 12px; }
  .app__field { font-size: 14px; color: var(--text); }
  .app__field b { color: var(--green-deep); display: block; margin-bottom: 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .app__actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
  .btn { padding: 11px 20px; border-radius: 50px; font: inherit; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer; border: 0; transition: all .15s; }
  .btn-approve { background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; box-shadow: 0 4px 14px rgba(212,175,55,0.3); }
  .btn-approve:hover { transform: translateY(-1px); }
  .btn-reject { background: #fff; border: 1px solid var(--bg-warm); color: var(--text-soft); }
  .btn-reject:hover { border-color: var(--green-deep); color: var(--green-deep); }
  .btn-pre-approve { background: #fff; border: 2px solid var(--gold); color: var(--mustard); }
  .btn-pre-approve:hover { background: var(--gold); color: #fff; transform: translateY(-1px); }
  .btn-revoke { background: #fff; border: 1px dashed var(--mustard); color: var(--mustard); }
  .btn-revoke:hover { background: #FCE4EC; }
  .btn-archive { background: #fff; border: 1px solid var(--text-soft); color: var(--text-soft); }
  .btn-archive:hover { border-color: var(--green-deep); color: var(--green-deep); }
  .btn-unarchive { background: var(--bg-warm); border: 0; color: var(--green-deep); }
  .btn-unarchive:hover { transform: translateY(-1px); }
  .btn-ghost { background: transparent; border: 1px solid var(--gold); color: var(--mustard); }
  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .status-submitted { background: var(--yellow); color: var(--green-deep); }
  .status-under_review { background: #fff4d9; color: var(--green-deep); border: 1px solid var(--gold); }
  .status-approved { background: var(--green); color: #fff; }
  .status-rejected { background: var(--bg-cool); color: var(--text); }
  .status-archived { background: #e8e4ec; color: var(--text-soft); }

  .moderation-note { margin-top: 12px; }
  .moderation-note textarea { width: 100%; background: var(--bg-warm); border: 1px solid rgba(76,70,81,0.15); padding: 12px 14px; border-radius: 10px; font: inherit; font-size: 13px; resize: vertical; min-height: 60px; color: var(--text); }

  /* Header guide buttons */
  .hdr__guides { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .guide-btn { background: #fff; border: 1px solid var(--gold); color: var(--mustard); padding: 9px 16px; border-radius: 50px; font: inherit; font-weight: 600; font-size: 12px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; }
  .guide-btn:hover { background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; }
  .guide-btn small { font-size: 10px; opacity: 0.8; font-weight: 500; }

  /* Lead card */
  .lead { background: #fff; border: 1px solid var(--bg-warm); border-radius: 16px; padding: 20px 22px; margin-bottom: 12px; transition: border-color .2s; }
  .lead:hover { border-color: var(--gold); }
  .lead.new { animation: flash 2s ease-out; }
  .lead__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .lead__visitor { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--green-deep); }
  .lead__master { font-size: 11px; color: var(--mustard); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 3px; }
  .lead__time { font-size: 11px; color: var(--text-soft); font-family: monospace; }
  .lead__body { display: grid; gap: 10px; padding-top: 12px; border-top: 1px solid var(--bg-warm); font-size: 14px; }
  .lead__body b { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--green-deep); margin-bottom: 3px; }
  .lead__filter { background: var(--bg-warm); border: 1px solid rgba(76,70,81,0.15); color: var(--text); padding: 10px 14px; border-radius: 10px; font: inherit; font-size: 13px; margin-bottom: 16px; min-width: 220px; }

  /* Master page card */
  .mp { background: #fff; border: 1px solid var(--bg-warm); border-radius: 16px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; }
  .mp:hover { border-color: var(--gold); }
  .mp__name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--green-deep); }
  .mp__meta { color: var(--text-soft); font-size: 12px; margin-top: 3px; }
  .mp__actions { display: flex; gap: 8px; }

  .empty { text-align: center; color: var(--text-soft); padding: 50px 20px; font-size: 14px; background: var(--bg-warm); border-radius: 16px; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(76,70,81,0.4); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-backdrop.on { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 36px; max-width: 540px; width: 100%; }
  .modal h2 { margin-bottom: 12px; }
  .modal p { color: var(--text); font-size: 14px; margin-bottom: 18px; }
  .modal__url { background: var(--bg-warm); padding: 14px 18px; border-radius: 12px; font-family: monospace; font-size: 13px; word-break: break-all; user-select: all; cursor: pointer; color: var(--green-deep); font-weight: 600; margin-bottom: 16px; }
  .modal__actions { display: flex; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="gate" id="gate">
    <h1>Админ-панель</h1>
    <p>Закрытая зона для команды МГ. Введи ключ доступа.</p>
    <input type="password" id="pwd" placeholder="Ключ" autofocus />
    <button id="enter">Войти</button>
    <div class="err" id="gateErr" style="display:none"></div>
  </div>
  <div id="main" style="display:none"></div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://qwoepdibvmwqgkkaabba.supabase.co';
const SB_KEY = 'sb_publishable_cbbjRN4EskeHOHy6pSCYLg_RCSH32fY';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const ADMIN_HASH = 'a5b4f151eae19e3decba7a00c66c1d487062791e3deb0d690594ad7923fac6a5';
const LS_KEY = 'mg-admin-pwd';

const AI_LEVEL_LABEL = {
  none:      'Не использую, только узнаёт',
  beginner:  'Начальный — пробовал(а) бесплатные',
  confident: 'Уверенный — регулярно использует бесплатные',
  advanced:  'Продвинутый — платит за подписки, встроил(а) в работу',
};

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtTime(s){if(!s)return'—';const d=new Date(s);return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
async function sha256(str){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

let adminPwd = null;
let appsData = [];
let pagesData = [];
let leadsData = [];
let leadsFilter = '';
let supportData = [];

// ── GATE ─────────────────────────────────────────────────
document.getElementById('enter').addEventListener('click', async () => {
  const pwd = document.getElementById('pwd').value;
  const h = await sha256(pwd);
  if (h !== ADMIN_HASH) {
    const err = document.getElementById('gateErr');
    err.textContent = 'Неверный ключ';
    err.style.display = 'block';
    return;
  }
  adminPwd = pwd;
  sessionStorage.setItem(LS_KEY, pwd);
  show();
});
document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('enter').click();
});

if (sessionStorage.getItem(LS_KEY)) {
  adminPwd = sessionStorage.getItem(LS_KEY);
  show();
}

// ── MAIN ─────────────────────────────────────────────────
async function show() {
  document.getElementById('gate').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';
  main.innerHTML = '<div class="hdr"><h1>Загружаем...</h1></div>';

  await loadAll();
  renderShell();
  subscribeRealtime();
}

async function loadAll() {
  // Анкеты через RPC
  const apps = await sb.rpc('mg_admin_list_applications', { admin_secret: adminPwd });
  appsData = apps.data || [];
  if (apps.error) { console.error('apps error:', apps.error); }

  // Собранные страницы через RPC
  const pages = await sb.rpc('mg_admin_list_pages', { admin_secret: adminPwd });
  pagesData = pages.data || [];
  if (pages.error) { console.error('pages error:', pages.error); }

  // Заявки участников (лиды) через RPC
  const leads = await sb.rpc('mg_admin_list_leads', { admin_secret: adminPwd });
  leadsData = leads.data || [];
  if (leads.error) { console.error('leads error:', leads.error); }

  // Сообщения поддержки через RPC
  const support = await sb.rpc('mg_admin_list_support_messages', { admin_secret: adminPwd });
  supportData = support.data || [];
  if (support.error) { console.error('support error:', support.error); }
}

function renderShell() {
  const submittedCount = appsData.filter(a => a.status === 'submitted' || a.status === 'under_review').length;
  const approvedCount = appsData.filter(a => a.status === 'approved').length;
  const publishedCount = pagesData.filter(p => p.published).length;
  const leadsCount = leadsData.length;
  const supportNewCount = supportData.filter(m => m.status === 'new').length;

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="hdr">
      <div>
        <h1>МГ · админ-панель</h1>
        <div class="hdr__sub">Нейро Бабки СССР · модерация анкет и страниц</div>
        <div class="hdr__guides" style="margin-top:14px">
          <a class="guide-btn" href="/mg/guide" target="_blank">📘 Гайд для мастера <small>↗</small></a>
          <button class="guide-btn" id="copyGuideBtn">📋 Скопировать ссылку на гайд</button>
          <button class="guide-btn" id="copyJoinBtn">📋 Скопировать ссылку на анкету</button>
          <a class="guide-btn" href="/mg/help" target="_blank">📕 Моя инструкция <small>↗</small></a>
        </div>
      </div>
      <button class="logout" id="logout">Выйти</button>
    </div>

    <div class="stats">
      <div class="stat ${submittedCount > 0 ? 'highlight' : ''}">
        <div class="stat__n">${submittedCount}</div>
        <div class="stat__l">Новых анкет</div>
      </div>
      <div class="stat">
        <div class="stat__n">${approvedCount}</div>
        <div class="stat__l">Одобрено</div>
      </div>
      <div class="stat">
        <div class="stat__n">${publishedCount}</div>
        <div class="stat__l">Опубликовано</div>
      </div>
      <div class="stat ${leadsCount > 0 ? 'highlight' : ''}">
        <div class="stat__n">${leadsCount}</div>
        <div class="stat__l">Заявки участников</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab on" data-p="pane-apps">🆕 Анкеты ${submittedCount > 0 ? `(${submittedCount})` : ''}</button>
      <button class="tab" data-p="pane-pages">📄 Страницы</button>
      <button class="tab" data-p="pane-leads">📨 Заявки участников ${leadsCount > 0 ? `(${leadsCount})` : ''}</button>
      <button class="tab" data-p="pane-support">💬 Поддержка ${supportNewCount > 0 ? `(${supportNewCount})` : ''}</button>
    </div>

    <div class="pane on" id="pane-apps">
      <h2>Очередь анкет</h2>
      <p class="pane-desc">Новые анкеты появляются в реальном времени. Одобрение создаёт страницу мастера и возвращает ссылку на конструктор — ты отправляешь её мастеру в Telegram.</p>
      <div id="appsList"></div>
    </div>

    <div class="pane" id="pane-pages">
      <h2>Собранные страницы</h2>
      <p class="pane-desc">Все страницы одобренных мастеров — опубликованные и в работе.</p>
      <div id="pagesList"></div>
    </div>

    <div class="pane" id="pane-leads">
      <h2>Заявки участников</h2>
      <p class="pane-desc">Когда участник мастер-группы заполняет форму на публичной странице другого мастера — заявка падает сюда в реальном времени. Показывает, к какому мастеру пришла запись.</p>
      <div id="leadsFilterWrap"></div>
      <div id="leadsList"></div>
    </div>

    <div class="pane" id="pane-support">
      <h2>Поддержка</h2>
      <p class="pane-desc">Сообщения от мастеров через форму «Написать команде» на публичных страницах. Новые сверху, обработанные уходят вниз.</p>
      <div id="supportList"></div>
    </div>

  `;

  main.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    main.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    main.querySelectorAll('.pane').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
    main.querySelector('#' + t.dataset.p).classList.add('on');
  }));

  document.getElementById('logout').addEventListener('click', () => {
    sessionStorage.removeItem(LS_KEY);
    location.reload();
  });

  document.getElementById('copyGuideBtn').addEventListener('click', (e) => {
    const url = new URL('/mg/guide', location.href).href;
    navigator.clipboard.writeText(url).then(() => {
      const original = e.target.innerHTML;
      e.target.innerHTML = '✓ Скопировано';
      setTimeout(() => { e.target.innerHTML = original; }, 2000);
    });
  });

  document.getElementById('copyJoinBtn').addEventListener('click', (e) => {
    const url = new URL('/mg/join', location.href).href;
    navigator.clipboard.writeText(url).then(() => {
      const original = e.target.innerHTML;
      e.target.innerHTML = '✓ Скопировано';
      setTimeout(() => { e.target.innerHTML = original; }, 2000);
    });
  });

  renderApps();
  renderPages();
  renderLeads();
  renderSupport();
}

function renderApps() {
  const el = document.getElementById('appsList');
  // Сначала submitted, потом под review, потом approved, потом rejected
  const order = { 'submitted': 0, 'under_review': 1, 'approved': 2, 'rejected': 3, 'archived': 4 };
  const sorted = [...appsData].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9) || new Date(b.created_at) - new Date(a.created_at));

  if (!sorted.length) {
    el.innerHTML = '<div class="empty">Пока анкет нет. Когда кто-то заполнит форму на /mg/join — появится здесь в реальном времени.</div>';
    return;
  }

  el.innerHTML = sorted.map(a => renderAppCard(a)).join('');

  // Bind expanders и кнопки
  el.querySelectorAll('.app').forEach(card => {
    const id = +card.dataset.id;
    const body = card.querySelector('.app__body');
    card.querySelector('.app__top').addEventListener('click', () => {
      body.style.display = body.style.display === 'none' ? 'grid' : 'none';
    });
    const preApproveBtn = card.querySelector('.btn-pre-approve');
    const approveBtn = card.querySelector('.btn-approve');
    const rejectBtn = card.querySelector('.btn-reject');
    const revokeBtn = card.querySelector('.btn-revoke');
    const archiveBtn = card.querySelector('.btn-archive');
    const unarchiveBtn = card.querySelector('.btn-unarchive');
    if (preApproveBtn) preApproveBtn.addEventListener('click', (e) => { e.stopPropagation(); moderate(id, 'pre_approved', card); });
    if (approveBtn)    approveBtn.addEventListener('click',    (e) => { e.stopPropagation(); moderate(id, 'approved', card); });
    if (rejectBtn)     rejectBtn.addEventListener('click',     (e) => { e.stopPropagation(); moderate(id, 'rejected', card); });
    if (revokeBtn)     revokeBtn.addEventListener('click',     (e) => { e.stopPropagation(); revokeApproval(id, card); });
    if (archiveBtn)    archiveBtn.addEventListener('click',    (e) => { e.stopPropagation(); archiveApp(id); });
    if (unarchiveBtn)  unarchiveBtn.addEventListener('click',  (e) => { e.stopPropagation(); unarchiveApp(id); });
  });
}

function renderAppCard(a) {
  const canStage1   = a.status === 'submitted';
  const canStage2   = a.status === 'under_review' && !!a.stage_1_approved_at;
  const canReject   = a.status === 'submitted' || a.status === 'under_review';
  const canRevoke   = a.status === 'approved' || (a.status === 'under_review' && !!a.stage_1_approved_at);
  const canArchive  = a.status !== 'archived';
  const canUnarchive = a.status === 'archived';
  const canModerate = canStage1 || canStage2 || canReject || canRevoke || canArchive || canUnarchive;
  const statusCls = `status-${a.status}`;
  let statusText = { submitted: 'Новая', under_review: 'В рабочей группе', approved: 'Финально одобрена', rejected: 'Отклонена', archived: 'В архиве' }[a.status] || a.status;
  const newCls = (canStage1 || canStage2) ? 'new' : '';

  return `
    <div class="app ${newCls}" data-id="${a.id}">
      <div class="app__top" style="cursor:pointer">
        <div>
          <div class="app__name">${esc(a.full_name)}</div>
          <div class="app__niche">${esc(a.niche || '—')}</div>
          <div class="app__meta">
            <span>№ Мастер ${a.master_number}</span>
            <span>${esc(a.city || '—')}</span>
            <span>${esc(fmtTime(a.created_at))}</span>
          </div>
        </div>
        <span class="status-badge ${statusCls}">${statusText}</span>
      </div>
      <div class="app__body">
        <div class="app__field"><b>Контакт</b>${esc(a.contact)}</div>
        ${a.business_desc ? `<div class="app__field"><b>Бизнес</b>${esc(a.business_desc)}</div>` : ''}
        ${a.mg_context ? `<div class="app__field"><b>Тема мастер-группы</b>${esc(a.mg_context)}</div>` : ''}
        ${a.goal ? `<div class="app__field"><b>Зачем в МГ / что изменится</b>${esc(a.goal)}</div>` : ''}
        ${a.team_expectations ? `<div class="app__field"><b>Ожидания от команды</b>${esc(a.team_expectations)}</div>` : ''}
        ${a.ai_level ? `<div class="app__field"><b>Уровень с нейросетями</b>${esc(AI_LEVEL_LABEL[a.ai_level] || a.ai_level)}</div>` : ''}
        ${a.experience ? `<div class="app__field"><b>Опыт в бизнесе</b>${esc(a.experience)}</div>` : ''}
        ${(a.meetings_per_week || a.program_duration_weeks || a.tuesday_20_msk_commitment !== undefined) ? `
          <div class="app__field"><b>График</b>
            ${a.meetings_per_week ? `встреч в неделю: ${esc(a.meetings_per_week)}` : ''}${a.meetings_per_week && a.program_duration_weeks ? ' · ' : ''}
            ${a.program_duration_weeks ? `длительность: ${esc(a.program_duration_weeks)} нед.` : ''}
            ${(a.meetings_per_week || a.program_duration_weeks) ? '<br>' : ''}
            ${a.tuesday_20_msk_commitment === true ? '✅ Готов(а) на вторник 20:00 МСК' : (a.tuesday_20_msk_commitment === false ? '⛔ Не подтвердил(а) вторник 20:00 МСК' : '')}
          </div>
        ` : ''}
        ${a.moderation_note ? `<div class="app__field"><b>Твой комментарий</b>${esc(a.moderation_note)}</div>` : ''}

        ${a.stage_1_approved_at ? `<div class="app__field"><b>1-е одобрение</b>${esc(fmtTime(a.stage_1_approved_at))} — мастер получил ссылку на рабочую группу</div>` : ''}

        ${canModerate ? `
          <div class="moderation-note">
            <textarea class="note-input" placeholder="Комментарий к решению (необязательно)"></textarea>
          </div>
          <div class="app__actions">
            ${canStage1 ? '<button class="btn btn-pre-approve">✅ Одобрить (дать ссылку на рабочую группу)</button>' : ''}
            ${canStage2 ? '<button class="btn btn-approve">🚀 Финальное одобрение (создать конструктор)</button>' : ''}
            ${canReject ? '<button class="btn btn-reject">Отклонить</button>' : ''}
            ${canRevoke ? '<button class="btn btn-revoke">↩ Отозвать одобрение</button>' : ''}
            ${canArchive ? '<button class="btn btn-archive">🗄 В архив</button>' : ''}
            ${canUnarchive ? '<button class="btn btn-unarchive">↻ Вернуть из архива</button>' : ''}
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

async function moderate(appId, newStatus, cardEl) {
  const note = cardEl.querySelector('.note-input')?.value || '';
  const confirmMsg = {
    pre_approved: 'Первое одобрение: мастер получит ссылку на рабочую группу в Telegram. Продолжить?',
    approved:     'Финальное одобрение: будет создана страница мастера и сгенерирован токен конструктора. Продолжить?',
    rejected:     'Отклонить анкету?',
  }[newStatus];
  if (!confirm(confirmMsg)) return;

  const { data, error } = await sb.rpc('mg_moderate', {
    app_id: appId,
    new_status: newStatus,
    note: note,
    admin_secret: adminPwd,
  });

  if (error) { alert('Ошибка: ' + error.message); return; }

  if (newStatus === 'pre_approved') {
    showPreApprovedModal(data, appsData.find(a => a.id === appId));
  } else if (newStatus === 'approved') {
    showApprovedModal(data, appsData.find(a => a.id === appId));
  }

  await loadAll();
  renderShell();
}

async function revokeApproval(appId, cardEl) {
  const note = cardEl.querySelector('.note-input')?.value || '';
  if (!confirm('Отозвать одобрение?\n\nСтраница мастера будет удалена, анкета вернётся в статус «Новая» — можно одобрить заново или отклонить. Если у мастера уже есть опубликованная страница — она пропадёт.')) return;

  const { data, error } = await sb.rpc('mg_admin_revoke_approval', {
    app_id: appId,
    admin_secret: adminPwd,
    p_note: note || null,
  });
  if (error) { alert('Ошибка: ' + error.message); return; }

  alert('Одобрение отозвано. Анкета снова в очереди.');
  await loadAll();
  renderShell();
}

async function archiveApp(appId) {
  if (!confirm('Отправить анкету в архив?\n\nАнкета спрячется из активной очереди, страница снимется с публикации (но данные сохранятся). Можно вернуть из архива в любой момент.')) return;

  const { error } = await sb.rpc('mg_admin_archive_application', {
    app_id: appId,
    admin_secret: adminPwd,
  });
  if (error) { alert('Ошибка: ' + error.message); return; }

  await loadAll();
  renderShell();
}

async function unarchiveApp(appId) {
  if (!confirm('Вернуть анкету из архива?')) return;

  const { error } = await sb.rpc('mg_admin_unarchive_application', {
    app_id: appId,
    admin_secret: adminPwd,
  });
  if (error) { alert('Ошибка: ' + error.message); return; }

  await loadAll();
  renderShell();
}

function showPreApprovedModal(data, app) {
  const firstName = (app?.full_name || '').split(' ')[0] || 'Мастер';
  const groupUrl = data.working_group_url || '';
  const tgMessage = `Привет, ${firstName}! Твоя анкета прошла первичный отбор 🎉\n\nПриглашаю тебя в рабочую группу мастеров — там мы знакомимся и обсудим детали:\n${groupUrl}\n\nПосле общения в группе ты получишь финальное одобрение и доступ к конструктору своей страницы.`;

  const modal = document.getElementById('modal');
  const backdrop = document.getElementById('modalBackdrop');

  modal.innerHTML = `
    <h2>✅ Первое одобрение</h2>
    <p><strong>${esc(firstName)}</strong> — Мастер ${data.master_number}. Мастер переводится на этап <em>«в рабочей группе»</em>. Отправь ему ссылку:</p>
    <div class="modal__url">${esc(groupUrl)}</div>
    <div class="modal__actions">
      <button class="btn btn-approve" id="copyMsgBtn">📋 Скопировать готовое сообщение для Telegram</button>
      <button class="btn btn-ghost" id="copyUrlBtn">Только ссылку</button>
      <button class="btn btn-reject" id="closeBtn">Закрыть</button>
    </div>
    <p style="margin-top:14px;font-size:12px;color:var(--text-soft)">💡 Мастер увидит эту же ссылку в своём статусе (по сохранённой ссылке анкеты).</p>
  `;

  backdrop.classList.add('on');

  document.getElementById('copyMsgBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(tgMessage).then(() => {
      document.getElementById('copyMsgBtn').textContent = '✓ Скопировано';
    });
  });
  document.getElementById('copyUrlBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(groupUrl).then(() => {
      document.getElementById('copyUrlBtn').textContent = '✓ Скопировано';
    });
  });
  document.getElementById('closeBtn').addEventListener('click', () => backdrop.classList.remove('on'));
}

function showApprovedModal(data, app) {
  const slug = data.slug;
  const token = data.master_token;
  const buildUrl = new URL('/mg/build', location.href);
  buildUrl.searchParams.set('m', slug);
  buildUrl.searchParams.set('t', token);
  const fullUrl = buildUrl.href;

  const firstName = (app?.full_name || '').split(' ')[0] || 'Мастер';
  const tgMessage = `Привет, ${firstName}! Твоя анкета на МГ-платформу одобрена 🎉\n\nВот ссылка на конструктор твоей страницы:\n${fullUrl}\n\nУ тебя 8 коротких вопросов — примерно 20 минут работы. Сохрани ссылку — она секретная, доступ только у тебя.\n\nКак заполнишь и опубликуешь — пришлю тебе твою живую ссылку :)`;

  const modal = document.getElementById('modal');
  const backdrop = document.getElementById('modalBackdrop');

  modal.innerHTML = `
    <h2>✅ Анкета одобрена</h2>
    <p><strong>${esc(firstName)}</strong> — Мастер ${data.master_number}. Страница создана. Теперь отправь мастеру эту ссылку на конструктор — токен доступа внутри неё:</p>
    <div class="modal__url">${esc(fullUrl)}</div>
    <div class="modal__actions">
      <button class="btn btn-approve" id="copyMsgBtn">📋 Скопировать готовое сообщение для Telegram</button>
      <button class="btn btn-ghost" id="copyUrlBtn">Только ссылку</button>
      <button class="btn btn-reject" id="closeBtn">Закрыть</button>
    </div>
    <p style="margin-top:14px;font-size:12px;color:var(--text-soft)">💾 Ссылка сохранена в админке — если мастер её потеряет, открой вкладку «Страницы» и нажми «📋 Ссылка на конструктор», пришлётся та же самая.</p>
  `;

  backdrop.classList.add('on');

  document.getElementById('copyMsgBtn').addEventListener('click', (e) => {
    navigator.clipboard.writeText(tgMessage).then(() => {
      e.target.textContent = '✓ Скопировано! Вставь мастеру в Telegram';
    });
  });
  document.getElementById('copyUrlBtn').addEventListener('click', (e) => {
    navigator.clipboard.writeText(fullUrl).then(() => {
      e.target.textContent = '✓ Ссылка скопирована';
    });
  });
  document.getElementById('closeBtn').addEventListener('click', () => {
    backdrop.classList.remove('on');
  });
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) backdrop.classList.remove('on');
  });
}

function renderPages() {
  const el = document.getElementById('pagesList');
  if (!pagesData.length) {
    el.innerHTML = '<div class="empty">Пока нет собранных страниц. Как одобришь первую анкету и мастер пройдёт конструктор — появится здесь.</div>';
    return;
  }
  el.innerHTML = pagesData.map(p => {
    // Публичная красивая ссылка: /mg/m/<slug>
    const pageUrl = new URL(`/mg/m/${encodeURIComponent(p.slug)}`, location.href);
    const previewUrl = new URL('/mg/page', location.href);
    previewUrl.searchParams.set('m', p.slug);
    previewUrl.searchParams.set('preview', '1');
    return `
      <div class="mp" data-slug="${esc(p.slug)}">
        <div>
          <div class="mp__name">${esc(p.display_name || p.full_name || 'Без имени')}</div>
          <div class="mp__meta">
            ${p.published ? '✅ Опубликовано' : '📝 Черновик'} ·
            Мастер ${p.master_number} ·
            ${esc(p.niche || '—')} ·
            Обновлено ${esc(fmtTime(p.updated_at))}
          </div>
        </div>
        <div class="mp__actions">
          <button class="btn btn-ghost" data-action="copy-build-link">📋 Ссылка на конструктор</button>
          ${p.published
            ? `<a class="btn btn-approve" href="${pageUrl.href}" target="_blank">Открыть</a>`
            : `<a class="btn btn-ghost" href="${previewUrl.href}" target="_blank">Превью</a>`
          }
        </div>
      </div>
    `;
  }).join('');

  // Bind: кнопка "Ссылка на конструктор" — копирует в буфер для пересылки мастеру
  el.querySelectorAll('[data-action="copy-build-link"]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const card = e.target.closest('.mp');
      const slug = card.dataset.slug;
      const origText = e.target.textContent;
      e.target.textContent = '…';

      const { data, error } = await sb.rpc('mg_admin_get_master_link', {
        admin_secret: adminPwd,
        p_slug: slug,
      });

      if (error) { alert('Ошибка: ' + error.message); e.target.textContent = origText; return; }

      if (data.needs_regenerate) {
        // Старая страница до миграции 205 — токен не сохранён
        if (!confirm(`У этой страницы не сохранён токен (создана до апдейта). Перевыпустить токен? Старая ссылка перестанет работать — убедись, что у мастера её нет на руках.`)) {
          e.target.textContent = origText;
          return;
        }
        const regen = await sb.rpc('mg_admin_regenerate_token', { admin_secret: adminPwd, p_slug: slug });
        if (regen.error) { alert('Ошибка: ' + regen.error.message); e.target.textContent = origText; return; }
        data.master_token = regen.data.master_token;
      }

      const buildUrl = new URL('/mg/build', location.href);
      buildUrl.searchParams.set('m', slug);
      buildUrl.searchParams.set('t', data.master_token);
      const fullUrl = buildUrl.href;

      const firstName = (data.master_name || '').split(' ')[0] || 'Мастер';
      const tgMessage = `Привет, ${firstName}! Вот ссылка на конструктор твоей страницы на МГ-платформе:\n\n${fullUrl}\n\n8 коротких вопросов — примерно 20 минут работы. Сохрани ссылку в заметках, она твоя личная.`;

      await navigator.clipboard.writeText(tgMessage);
      e.target.textContent = '✓ Сообщение скопировано';
      setTimeout(() => { e.target.textContent = origText; }, 2500);
    });
  });
}

function renderSupport() {
  const list = document.getElementById('supportList');
  if (!list) return;

  if (!supportData.length) {
    list.innerHTML = '<div class="empty">Пока сообщений нет. Когда мастер нажмёт «Написать команде» на гайде или другой публичной странице — появится здесь в реальном времени.</div>';
    return;
  }

  list.innerHTML = supportData.map(m => renderSupportCard(m)).join('');

  list.querySelectorAll('.support').forEach(card => {
    const id = +card.dataset.id;
    const msg = supportData.find(m => m.id === id);
    card.querySelectorAll('[data-support-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const action = btn.dataset.supportAction;
        const newStatus = action === 'read' ? 'read' : action === 'resolved' ? 'resolved' : 'new';
        const { error } = await sb.rpc('mg_admin_update_support_status', {
          admin_secret: adminPwd,
          msg_id: id,
          new_status: newStatus,
          p_note: null,
        });
        if (error) { alert('Ошибка: ' + error.message); return; }
        await loadAll();
        renderShell();
      });
    });
  });
}

function renderSupportCard(m) {
  const statusText = { new: 'Новое', read: 'Прочитано', resolved: 'Закрыто' }[m.status] || m.status;
  const statusCls  = m.status === 'new' ? 'status-submitted' : m.status === 'read' ? 'status-under_review' : 'status-approved';
  return `
    <div class="support app" data-id="${m.id}" style="margin-bottom:12px">
      <div class="app__top" style="cursor:default">
        <div>
          <div class="app__name">${esc(m.from_name || 'Без имени')}</div>
          <div class="app__niche">${esc(m.from_contact || '— контакт не указан')}</div>
          <div class="app__meta">
            <span>${esc(fmtTime(m.created_at))}</span>
            ${m.source_page ? `<span>со страницы ${esc(m.source_page)}</span>` : ''}
          </div>
        </div>
        <span class="status-badge ${statusCls}">${statusText}</span>
      </div>
      <div class="app__body" style="display:grid">
        <div class="app__field" style="white-space:pre-line"><b>Сообщение</b>${esc(m.message)}</div>
        <div class="app__actions">
          ${m.status === 'new' ? '<button class="btn btn-approve" data-support-action="read">✓ Прочитано</button>' : ''}
          ${m.status !== 'resolved' ? '<button class="btn btn-archive" data-support-action="resolved">🗄 Закрыть</button>' : ''}
          ${m.status !== 'new' ? '<button class="btn btn-reject" data-support-action="new">↩ В новые</button>' : ''}
        </div>
      </div>
    </div>
  `;
}

function renderLeads() {
  const filterWrap = document.getElementById('leadsFilterWrap');
  const list = document.getElementById('leadsList');

  // Уникальные мастера из лидов
  const masters = [...new Map(leadsData.map(l => [l.master_slug, l.master_name || l.master_slug])).entries()];

  if (masters.length > 0) {
    filterWrap.innerHTML = `
      <select class="lead__filter" id="leadsFilterSel">
        <option value="">Все мастера (${leadsData.length})</option>
        ${masters.map(([slug, name]) => {
          const cnt = leadsData.filter(l => l.master_slug === slug).length;
          return `<option value="${esc(slug)}" ${leadsFilter === slug ? 'selected' : ''}>${esc(name)} (${cnt})</option>`;
        }).join('')}
      </select>
    `;
    document.getElementById('leadsFilterSel').addEventListener('change', (e) => {
      leadsFilter = e.target.value;
      renderLeads();
    });
  } else {
    filterWrap.innerHTML = '';
  }

  const filtered = leadsFilter ? leadsData.filter(l => l.master_slug === leadsFilter) : leadsData;

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">Пока заявок нет. Когда участник заполнит форму на публичной странице мастера — появится здесь в реальном времени.</div>';
    return;
  }

  list.innerHTML = filtered.map(l => `
    <div class="lead">
      <div class="lead__top">
        <div>
          <div class="lead__visitor">${esc(l.visitor_name)}</div>
          <div class="lead__master">→ к мастеру: ${esc(l.master_name || l.master_slug)}</div>
        </div>
        <div class="lead__time">${esc(fmtTime(l.created_at))}</div>
      </div>
      <div class="lead__body">
        <div><b>Контакт</b>${esc(l.visitor_contact)}</div>
        ${l.message ? `<div><b>Сообщение</b>${esc(l.message)}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function subscribeRealtime() {
  sb.channel('mg-admin-apps')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mg_applications' },
      async () => { await loadAll(); renderShell(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'mg_applications' },
      async () => { await loadAll(); renderShell(); })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mg_leads' },
      async () => { await loadAll(); renderShell(); })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mg_support_messages' },
      async () => { await loadAll(); renderShell(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'mg_support_messages' },
      async () => { await loadAll(); renderShell(); })
    .subscribe();
}
