<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Админ-панель · мастер-группы</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html,body { background: #0a0a0a; color: #e8e0d8; font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.5; min-height: 100vh; }
  body { background: radial-gradient(1400px 700px at 20% -10%, #101a10, #0a0a0a 60%); padding: 0 clamp(16px, 3vw, 32px); }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 0 80px; }

  .gate { max-width: 420px; margin: 120px auto 0; background: #141414; border: 1px solid #252525; border-radius: 16px; padding: 32px; text-align: center; }
  .gate h1 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 12px; }
  .gate p { color: #8a8680; font-size: 14px; margin-bottom: 20px; }
  .gate input { width: 100%; background: #0f0f0f; border: 1px solid #2a2a2a; color: #e8e0d8; padding: 14px 16px; border-radius: 10px; font: inherit; font-size: 15px; margin-bottom: 12px; }
  .gate input:focus { outline: none; border-color: #c99700; }
  .gate button { width: 100%; background: #c99700; color: #0a0a0a; border: 0; padding: 14px; border-radius: 10px; font: inherit; font-weight: 700; cursor: pointer; }
  .gate .err { color: #ff7a7a; margin-top: 12px; font-size: 13px; }

  .hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
  .hdr h1 { font-family: 'Playfair Display', serif; font-size: clamp(26px, 4vw, 38px); }
  .hdr__sub { color: #8a8680; font-size: 14px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat { background: #141414; border: 1px solid #252525; border-radius: 14px; padding: 22px; }
  .stat__n { font-family: 'Playfair Display', serif; font-size: 40px; color: #c99700; line-height: 1; }
  .stat__l { color: #8a8680; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }

  h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin: 28px 0 14px; }

  .masters { display: grid; gap: 14px; }
  .master { background: #141414; border: 1px solid #252525; border-radius: 14px; padding: 20px; cursor: pointer; transition: border-color .2s, transform .1s; }
  .master:hover { border-color: #c99700; }
  .master__top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .master__name { font-family: 'Playfair Display', serif; font-size: 20px; }
  .master__niche { color: #c99700; font-size: 13px; margin-top: 2px; }
  .master__stats { display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap; }
  .master__stat { color: #c8c0b8; font-size: 13px; }
  .master__stat b { color: #e8e0d8; font-size: 16px; }

  .detail { background: #141414; border: 1px solid #252525; border-radius: 14px; padding: 24px; margin-top: 16px; display: none; }
  .detail.on { display: block; }
  .detail h3 { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 12px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 720px) { .detail-grid { grid-template-columns: 1fr; } }
  .list { display: grid; gap: 8px; }
  .list__item { background: #1a1a1a; border: 1px solid #252525; border-radius: 10px; padding: 12px 14px; font-size: 13px; }
  .list__item b { color: #e8e0d8; }
  .list__item span { color: #8a8680; }
  .empty { color: #6a6660; font-size: 13px; padding: 14px; text-align: center; }

  .export { background: #1a1a1a; border: 1px solid #2a2a2a; color: #c8c0b8; padding: 10px 16px; border-radius: 10px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .export:hover { border-color: #c99700; color: #c99700; }

  .logout { background: transparent; border: 0; color: #6a6660; cursor: pointer; font: inherit; font-size: 13px; }
  .logout:hover { color: #ff7a7a; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="gate" id="gate">
    <h1>Админ-панель</h1>
    <p>Закрытая зона Инны. Введи ключ доступа.</p>
    <input type="password" id="pwd" placeholder="Ключ" autofocus />
    <button id="enter">Войти</button>
    <div class="err" id="gate-err" style="display:none"></div>
  </div>
  <div id="main" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://qwoepdibvmwqgkkaabba.supabase.co';
const SB_KEY = 'sb_publishable_cbbjRN4EskeHOHy6pSCYLg_RCSH32fY';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const ADMIN_HASH = 'a5b4f151eae19e3decba7a00c66c1d487062791e3deb0d690594ad7923fac6a5';
const LS_KEY = 'mg-admin-ok';

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtTime(s){const d=new Date(s);return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
async function sha256(str){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

async function gate(pwd) {
  const h = await sha256(pwd);
  return h === ADMIN_HASH;
}

document.getElementById('enter').addEventListener('click', async () => {
  const pwd = document.getElementById('pwd').value;
  if (await gate(pwd)) {
    sessionStorage.setItem(LS_KEY, '1');
    show();
  } else {
    const err = document.getElementById('gate-err');
    err.textContent = 'Неверный ключ';
    err.style.display = 'block';
  }
});
document.getElementById('pwd').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('enter').click();
});

if (sessionStorage.getItem(LS_KEY) === '1') show();

async function show() {
  document.getElementById('gate').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';
  main.innerHTML = '<div class="hdr"><h1>Загружаем...</h1></div>';

  const [mastersRes, partsRes, casesRes, matsRes, tasksRes, msgsRes] = await Promise.all([
    sb.from('mg_masters').select('*').order('created_at'),
    sb.from('mg_participants').select('*').order('created_at', { ascending: false }),
    sb.from('mg_cases').select('*'),
    sb.from('mg_materials').select('id,master_id'),
    sb.from('mg_tasks').select('id,master_id'),
    sb.from('mg_messages').select('id,master_id'),
  ]);
  if (mastersRes.error) { main.innerHTML = `<div style="color:#ff7a7a">${esc(mastersRes.error.message)}</div>`; return; }

  const masters = mastersRes.data || [];
  const parts = partsRes.data || [];
  const cases = casesRes.data || [];
  const mats = matsRes.data || [];
  const tasks = tasksRes.data || [];
  const msgs = msgsRes.data || [];

  const by = (arr, mid) => arr.filter(x => x.master_id === mid);

  main.innerHTML = `
    <div class="hdr">
      <div>
        <h1>Мастер-группы</h1>
        <div class="hdr__sub">Нейро Бабки СССР · внутренняя админка</div>
      </div>
      <button class="logout" id="logout">Выйти</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat__n">${masters.length}</div><div class="stat__l">Мастеров</div></div>
      <div class="stat"><div class="stat__n">${parts.length}</div><div class="stat__l">Участников</div></div>
      <div class="stat"><div class="stat__n">${cases.length}</div><div class="stat__l">Кейсов</div></div>
      <div class="stat"><div class="stat__n">${msgs.length}</div><div class="stat__l">Сообщений</div></div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <h2 style="margin:0">Мастера</h2>
      <button class="export" id="export">⬇ Скачать всех участников CSV</button>
    </div>

    <div class="masters" id="masters">
      ${masters.map(m => {
        const mp = by(parts, m.id); const mc = by(cases, m.id);
        return `
        <div class="master" data-id="${esc(m.id)}">
          <div class="master__top">
            <div>
              <div class="master__name">${esc(m.name)}</div>
              <div class="master__niche">${esc(m.niche || '')}</div>
            </div>
            <div style="color:#6a6660;font-size:12px">slug: ${esc(m.id)}</div>
          </div>
          <div class="master__stats">
            <div class="master__stat"><b>${mp.length}</b> участников</div>
            <div class="master__stat"><b>${by(mats, m.id).length}</b> материалов</div>
            <div class="master__stat"><b>${by(tasks, m.id).length}</b> заданий</div>
            <div class="master__stat"><b>${mc.length}</b> кейсов</div>
          </div>
          <div class="detail" id="det-${esc(m.id)}">
            <div class="detail-grid">
              <div>
                <h3>Участники</h3>
                <div class="list">
                  ${mp.length ? mp.map(p => `<div class="list__item"><b>${esc(p.name)}</b> ${p.contact?`<span>· ${esc(p.contact)}</span>`:''} <span style="float:right">${esc(fmtTime(p.created_at))}</span></div>`).join('') : '<div class="empty">Нет записей</div>'}
                </div>
              </div>
              <div>
                <h3>Кейсы</h3>
                <div class="list">
                  ${mc.length ? mc.map(c => `<div class="list__item"><b>${esc(c.participant_name)}</b><div style="color:#c8c0b8;margin-top:4px">${esc(c.result)}</div></div>`).join('') : '<div class="empty">Нет кейсов</div>'}
                </div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;

  document.getElementById('logout').addEventListener('click', () => {
    sessionStorage.removeItem(LS_KEY); location.reload();
  });
  document.querySelectorAll('.master').forEach(el => {
    el.addEventListener('click', () => {
      el.querySelector('.detail').classList.toggle('on');
    });
  });
  document.getElementById('export').addEventListener('click', () => {
    const rows = [['master_id','master_name','participant_name','contact','joined_at']];
    parts.forEach(p => {
      const m = masters.find(x => x.id === p.master_id);
      rows.push([p.master_id, m?.name || '', p.name, p.contact || '', p.created_at]);
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mg-participants-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  });
}
</script>
</body>
</html>
