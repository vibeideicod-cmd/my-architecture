<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Админ-панель · мастер-группы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #ffffff;
    --bg-warm:    #d3bfb1;
    --bg-cool:    #cbcbd4;
    --gold:       #d4af37;
    --mustard:    #c99700;
    --green:      #4b7850;
    --green-deep: #103206;
    --text:       #4c4651;
    --text-soft:  rgba(76, 70, 81, 0.62);
    --text-hint:  rgba(76, 70, 81, 0.45);
    --yellow:     #ffc403;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html,body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.6; min-height: 100vh; }
  body { padding: 0 clamp(16px, 3vw, 32px); }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 32px 0 80px; }

  .gate { max-width: 440px; margin: 120px auto 0; background: var(--bg-warm); border: 1px solid rgba(212,175,55,0.35); border-radius: 20px; padding: 44px 40px; text-align: center; }
  .gate h1 { font-family: 'Playfair Display', serif; font-size: 30px; margin-bottom: 14px; color: var(--green-deep); }
  .gate p { color: var(--text); font-size: 14px; margin-bottom: 24px; }
  .gate input { width: 100%; background: #fff; border: 1px solid rgba(76,70,81,0.15); color: var(--text); padding: 15px 18px; border-radius: 12px; font: inherit; font-size: 15px; margin-bottom: 14px; }
  .gate input::placeholder { color: var(--text-hint); }
  .gate input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }
  .gate button { width: 100%; background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; border: 0; padding: 15px; border-radius: 50px; font: inherit; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1.2px; font-size: 13px; box-shadow: 0 5px 18px rgba(212,175,55,0.35); }
  .gate button:hover { transform: translateY(-1px); }
  .gate .err { color: var(--green-deep); margin-top: 14px; font-size: 13px; font-weight: 600; }

  .hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; padding-bottom: 24px; border-bottom: 1px solid var(--bg-warm); }
  .hdr h1 { font-family: 'Playfair Display', serif; font-size: clamp(30px, 4vw, 42px); color: var(--green-deep); line-height: 1.1; }
  .hdr__sub { color: var(--text-soft); font-size: 14px; margin-top: 6px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 36px; }
  .stat { background: var(--bg-warm); border: 1px solid rgba(212,175,55,0.25); border-radius: 16px; padding: 26px; }
  .stat__n { font-family: 'Playfair Display', serif; font-size: 48px; color: var(--green-deep); line-height: 1; font-weight: 700; }
  .stat__l { color: var(--text-soft); font-size: 11px; text-transform: uppercase; letter-spacing: 1.4px; margin-top: 10px; font-weight: 700; }

  h2 { font-family: 'Playfair Display', serif; font-size: 28px; margin: 32px 0 18px; color: var(--green-deep); }

  .masters { display: grid; gap: 16px; }
  .master { background: #fff; border: 1px solid var(--bg-warm); border-radius: 18px; padding: 26px; cursor: pointer; transition: all .2s; }
  .master:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,175,55,0.12); }
  .master__top { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .master__name { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--green-deep); }
  .master__niche { color: var(--mustard); font-size: 11px; margin-top: 5px; text-transform: uppercase; letter-spacing: 1.3px; font-weight: 700; }
  .master__slug { color: var(--text-soft); font-size: 12px; font-family: monospace; }
  .master__stats { display: flex; gap: 24px; margin-top: 18px; flex-wrap: wrap; }
  .master__stat { color: var(--text); font-size: 13px; }
  .master__stat b { color: var(--green-deep); font-size: 20px; font-family: 'Playfair Display', serif; margin-right: 4px; font-weight: 700; }

  .detail { background: var(--bg-warm); border-radius: 14px; padding: 22px; margin-top: 18px; display: none; }
  .detail.on { display: block; }
  .detail h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--mustard); margin-bottom: 12px; font-family: 'Montserrat', sans-serif; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 720px) { .detail-grid { grid-template-columns: 1fr; } }
  .list { display: grid; gap: 8px; }
  .list__item { background: #fff; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--text); }
  .list__item b { color: var(--green-deep); font-weight: 700; }
  .list__item span { color: var(--text-soft); }
  .empty { color: var(--text-soft); font-size: 13px; padding: 18px; text-align: center; }

  .export { background: #fff; border: 1px solid var(--gold); color: var(--mustard); padding: 12px 22px; border-radius: 50px; font: inherit; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; text-transform: uppercase; letter-spacing: 1px; }
  .export:hover { background: var(--bg-warm); }

  .logout { background: transparent; border: 0; color: var(--text-soft); cursor: pointer; font: inherit; font-size: 13px; font-weight: 600; }
  .logout:hover { color: var(--mustard); }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="gate" id="gate">
    <h1>Админ-панель</h1>
    <p>Закрытая зона Инны. Введи ключ доступа.</p>
    <input type="password" id="pwd" placeholder="Ключ" autofocus />
    <button id="enter">Войти</button>
    <div class="err" id="gate-err" style="display:none"></div>
  </div>
  <div id="main" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://qwoepdibvmwqgkkaabba.supabase.co';
const SB_KEY = 'sb_publishable_cbbjRN4EskeHOHy6pSCYLg_RCSH32fY';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const ADMIN_HASH = 'a5b4f151eae19e3decba7a00c66c1d487062791e3deb0d690594ad7923fac6a5';
const LS_KEY = 'mg-admin-ok';

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtTime(s){const d=new Date(s);return d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
async function sha256(str){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}

async function gate(pwd) {
  const h = await sha256(pwd);
  return h === ADMIN_HASH;
}

document.getElementById('enter').addEventListener('click', async () => {
  const pwd = document.getElementById('pwd').value;
  if (await gate(pwd)) {
    sessionStorage.setItem(LS_KEY, '1');
    show();
  } else {
    const err = document.getElementById('gate-err');
    err.textContent = 'Неверный ключ';
    err.style.display = 'block';
  }
});
document.getElementById('pwd').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('enter').click();
});

if (sessionStorage.getItem(LS_KEY) === '1') show();

async function show() {
  document.getElementById('gate').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';
  main.innerHTML = '<div class="hdr"><h1>Загружаем...</h1></div>';

  const [mastersRes, partsRes, casesRes, matsRes, tasksRes, msgsRes] = await Promise.all([
    sb.from('mg_masters').select('*').order('created_at'),
    sb.from('mg_participants').select('*').order('created_at', { ascending: false }),
    sb.from('mg_cases').select('*'),
    sb.from('mg_materials').select('id,master_id'),
    sb.from('mg_tasks').select('id,master_id'),
    sb.from('mg_messages').select('id,master_id'),
  ]);
  if (mastersRes.error) { main.innerHTML = `<div class="err" style="color:#103206">${esc(mastersRes.error.message)}</div>`; return; }

  const masters = mastersRes.data || [];
  const parts = partsRes.data || [];
  const cases = casesRes.data || [];
  const mats = matsRes.data || [];
  const tasks = tasksRes.data || [];
  const msgs = msgsRes.data || [];

  const by = (arr, mid) => arr.filter(x => x.master_id === mid);

  main.innerHTML = `
    <div class="hdr">
      <div>
        <h1>Мастер-группы</h1>
        <div class="hdr__sub">Нейро Бабки СССР · внутренняя админка</div>
      </div>
      <button class="logout" id="logout">Выйти</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat__n">${masters.length}</div><div class="stat__l">Мастеров</div></div>
      <div class="stat"><div class="stat__n">${parts.length}</div><div class="stat__l">Участников</div></div>
      <div class="stat"><div class="stat__n">${cases.length}</div><div class="stat__l">Кейсов</div></div>
      <div class="stat"><div class="stat__n">${msgs.length}</div><div class="stat__l">Сообщений</div></div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <h2 style="margin:0">Мастера</h2>
      <button class="export" id="export">⬇ Скачать участников CSV</button>
    </div>

    <div class="masters" id="masters" style="margin-top:18px">
      ${masters.map(m => {
        const mp = by(parts, m.id); const mc = by(cases, m.id);
        return `
        <div class="master" data-id="${esc(m.id)}">
          <div class="master__top">
            <div>
              <div class="master__name">${esc(m.name)}</div>
              <div class="master__niche">${esc(m.niche || '')}</div>
            </div>
            <div class="master__slug">slug: ${esc(m.id)}</div>
          </div>
          <div class="master__stats">
            <div class="master__stat"><b>${mp.length}</b> участников</div>
            <div class="master__stat"><b>${by(mats, m.id).length}</b> материалов</div>
            <div class="master__stat"><b>${by(tasks, m.id).length}</b> заданий</div>
            <div class="master__stat"><b>${mc.length}</b> кейсов</div>
          </div>
          <div class="detail" id="det-${esc(m.id)}">
            <div class="detail-grid">
              <div>
                <h3>Участники</h3>
                <div class="list">
                  ${mp.length ? mp.map(p => `<div class="list__item"><b>${esc(p.name)}</b> ${p.contact?`<span>· ${esc(p.contact)}</span>`:''} <span style="float:right">${esc(fmtTime(p.created_at))}</span></div>`).join('') : '<div class="empty">Нет записей</div>'}
                </div>
              </div>
              <div>
                <h3>Кейсы</h3>
                <div class="list">
                  ${mc.length ? mc.map(c => `<div class="list__item"><b>${esc(c.participant_name)}</b><div style="margin-top:4px">${esc(c.result)}</div></div>`).join('') : '<div class="empty">Нет кейсов</div>'}
                </div>
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;

  document.getElementById('logout').addEventListener('click', () => {
    sessionStorage.removeItem(LS_KEY); location.reload();
  });
  document.querySelectorAll('.master').forEach(el => {
    el.addEventListener('click', () => {
      el.querySelector('.detail').classList.toggle('on');
    });
  });
  document.getElementById('export').addEventListener('click', () => {
    const rows = [['master_id','master_name','participant_name','contact','joined_at']];
    parts.forEach(p => {
      const m = masters.find(x => x.id === p.master_id);
      rows.push([p.master_id, m?.name || '', p.name, p.contact || '', p.created_at]);
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mg-participants-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  });
}
</script>
</body>
</html>
