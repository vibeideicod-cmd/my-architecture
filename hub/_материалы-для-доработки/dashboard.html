<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Сейф ссылок · Нейро Бабки СССР</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #ffffff;
    --bg-warm:    #d3bfb1;
    --bg-cool:    #cbcbd4;
    --gold:       #d4af37;
    --mustard:    #c99700;
    --green:      #4b7850;
    --green-deep: #103206;
    --text:       #4c4651;
    --text-soft:  rgba(76, 70, 81, 0.62);
    --yellow:     #ffc403;
  }
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html,body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; line-height: 1.6; min-height: 100vh; }
  body { padding: 0 clamp(16px, 3vw, 32px); }
  .wrap { max-width: 960px; margin: 0 auto; padding: 40px 0 100px; }

  /* Gate */
  .gate { max-width: 440px; margin: 120px auto 0; background: var(--bg-warm); border-radius: 20px; padding: 44px 40px; text-align: center; }
  .gate h1 { font-family: 'Playfair Display', serif; font-size: 30px; margin-bottom: 14px; color: var(--green-deep); }
  .gate p { color: var(--text); font-size: 14px; margin-bottom: 24px; }
  .gate input { width: 100%; background: #fff; border: 1px solid rgba(76,70,81,0.15); color: var(--text); padding: 15px 18px; border-radius: 12px; font: inherit; font-size: 15px; margin-bottom: 14px; }
  .gate input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }
  .gate button { width: 100%; background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; border: 0; padding: 15px; border-radius: 50px; font: inherit; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1.2px; font-size: 13px; }
  .gate .err { color: var(--green-deep); margin-top: 14px; font-size: 13px; font-weight: 600; }

  /* Header */
  .hdr { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; padding-bottom: 20px; border-bottom: 1px solid var(--bg-warm); }
  .hdr h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 4vw, 38px); color: var(--green-deep); line-height: 1.1; }
  .hdr__sub { color: var(--text-soft); font-size: 13px; margin-top: 4px; }
  .logout { background: transparent; border: 0; color: var(--text-soft); cursor: pointer; font: inherit; font-size: 13px; font-weight: 600; }
  .logout:hover { color: var(--mustard); }

  /* Filters */
  .filters { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; }
  .filter-btn { background: #fff; border: 1px solid var(--bg-warm); color: var(--text); padding: 8px 16px; border-radius: 50px; font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .filter-btn:hover { border-color: var(--gold); color: var(--mustard); }
  .filter-btn.on { background: linear-gradient(135deg, var(--gold), var(--mustard)); color: #fff; border-color: var(--gold); }

  /* Project section */
  .project { margin-bottom: 28px; }
  .project__hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .project__icon { font-size: 24px; }
  .project__name { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--green-deep); font-weight: 700; }
  .project__status { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 3px 10px; border-radius: 50px; }
  .st-live { background: var(--green); color: #fff; }
  .st-dev { background: var(--yellow); color: var(--green-deep); }
  .st-broken { background: #c94545; color: #fff; }

  /* Link row */
  .link-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #fff; border: 1px solid rgba(211,191,177,0.4); border-radius: 12px; margin-bottom: 6px; transition: border-color .15s; flex-wrap: wrap; }
  .link-row:hover { border-color: var(--gold); }
  .link-name { font-weight: 600; font-size: 13px; color: var(--green-deep); min-width: 160px; flex-shrink: 0; }
  .link-url { font-family: 'SF Mono', Menlo, monospace; font-size: 12px; color: var(--mustard); word-break: break-all; flex: 1; min-width: 0; }
  .link-url a { color: var(--mustard); text-decoration: none; }
  .link-url a:hover { text-decoration: underline; }
  .link-role { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 2px 8px; border-radius: 50px; flex-shrink: 0; }
  .role-admin { background: var(--green-deep); color: #fff; }
  .role-master { background: var(--gold); color: #fff; }
  .role-public { background: var(--bg-warm); color: var(--text); }
  .role-dev { background: var(--bg-cool); color: var(--text); }
  .copy-btn { background: transparent; border: 1px solid var(--bg-warm); color: var(--text-soft); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; flex-shrink: 0; transition: all .15s; display: flex; align-items: center; justify-content: center; }
  .copy-btn:hover { border-color: var(--gold); color: var(--mustard); }
  .copy-btn.ok { background: var(--green); border-color: var(--green); color: #fff; }

  .note { font-size: 11px; color: var(--text-soft); margin-top: 4px; margin-left: 14px; margin-bottom: 8px; }

  footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--bg-warm); color: var(--text-soft); font-size: 12px; text-align: center; }

  @media (max-width: 640px) {
    .link-name { min-width: 100%; }
    .link-url { min-width: 100%; }
    .link-row { gap: 6px; padding: 10px 10px; }
  }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="gate" id="gate">
    <h1>Сейф ссылок</h1>
    <p>Все проекты и ссылки в одном месте. Введи ключ доступа.</p>
    <input type="password" id="pwd" placeholder="Ключ" autofocus />
    <button id="enter">Войти</button>
    <div class="err" id="gateErr" style="display:none"></div>
  </div>
  <div id="main" style="display:none"></div>
</div>

<script>
const ADMIN_HASH = 'a5b4f151eae19e3decba7a00c66c1d487062791e3deb0d690594ad7923fac6a5';
const LS_KEY = 'nb-dashboard-pwd';
const BASE = 'https://demo.ideidlyabiznesa1913.ru';

async function sha256(str){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ═══════════════════════════════════════════════════════════
// ДАННЫЕ ССЫЛОК — редактировать здесь при добавлении проектов
// ═══════════════════════════════════════════════════════════
const PROJECTS = [
  {
    id: 'mg', name: 'МГ (Мастер-группа)', icon: '🏗', status: 'live',
    links: [
      { name: 'Лендинг',                url: `${BASE}/mg/`,                   role: 'public', copy: true },
      { name: 'Анкета (стать мастером)', url: `${BASE}/mg/join`,              role: 'master', copy: true },
      { name: 'Mini App (Telegram)',     url: 'https://t.me/mastergruppa_bot/mg_platform', role: 'master', copy: true },
      { name: 'Гайд для мастера',       url: `${BASE}/mg/guide`,             role: 'master', copy: true },
      { name: 'Тест-чеклист',           url: `${BASE}/mg/test`,              role: 'admin',  copy: true },
      { name: 'Админка',                url: `${BASE}/mg/admin`,             role: 'admin',  copy: true, note: 'Пароль: nbcccp-2026' },
      { name: 'Моя инструкция',         url: `${BASE}/mg/help`,              role: 'admin',  copy: true },
      { name: 'Бот',                    url: 'https://t.me/mastergruppa_bot', role: 'admin',  copy: true },
      { name: 'Статус анкеты',          url: `${BASE}/mg/status?a=<token>`,  role: 'master', copy: false, note: 'Автоматическая ссылка, мастер сохраняет сам' },
      { name: 'Конструктор',            url: `${BASE}/mg/build?m=<slug>&t=<token>`, role: 'master', copy: false, note: 'Автоматическая ссылка, генерируется при одобрении' },
      { name: 'Страница мастера',       url: `${BASE}/mg/m/<slug>`,          role: 'public', copy: false, note: 'Автоматическая ссылка, мастер получает при публикации' },
    ]
  },
  {
    id: 'beauty', name: 'Beauty (Визитка мастера)', icon: '💅', status: 'dev',
    links: [
      { name: 'Бот',                    url: 'https://t.me/beauty_vizitka_bot', role: 'dev', copy: true },
      { name: 'TMA (Vercel, временно)', url: 'https://beauty-tma-app.vercel.app', role: 'dev', copy: true, note: 'Временный деплой, целевой — Beget' },
      { name: 'Supabase Dashboard',     url: 'https://supabase.com/dashboard/project/qwoepdibvmwqgkkaabba', role: 'admin', copy: true },
    ]
  },
  {
    id: 'yub', name: 'ЮБ (Южнобережный)', icon: '🏖', status: 'live',
    links: [
      { name: 'Каталог',        url: `${BASE}/yub/`,             role: 'public', copy: true },
      { name: 'Рюкзак',         url: `${BASE}/yub/ryukzak.html`, role: 'public', copy: true },
      { name: 'Квиз',           url: `${BASE}/yub/quiz.html`,    role: 'public', copy: true },
      { name: 'Экскурсия',      url: `${BASE}/yub/tour.html`,    role: 'public', copy: true },
      { name: 'КП',             url: `${BASE}/yub/offer.html`,   role: 'public', copy: true },
      { name: 'Обратная связь', url: `${BASE}/yub/feedback.html`, role: 'public', copy: true },
      { name: 'Бот',            url: 'https://t.me/ryukzak_yub_bot', role: 'admin', copy: true, note: 'Webhook не работает (BUG-YUB-001)' },
    ]
  },
  {
    id: 'alisa', name: 'Алиса (Школа гитары)', icon: '🎸', status: 'live',
    links: [
      { name: 'Визитка', url: `${BASE}/alisa/`, role: 'public', copy: true },
    ]
  },
  {
    id: 'nb', name: 'Нейро Бабки (бренд)', icon: '🧠', status: 'live',
    links: [
      { name: 'Главная визитка', url: `${BASE}/`,                         role: 'public', copy: true },
      { name: 'HUB',             url: `${BASE}/hub/`,                     role: 'public', copy: true },
      { name: 'Визитка Ирины',   url: `${BASE}/Irina/vizitka.html`,      role: 'public', copy: true },
      { name: 'Лендинг Ирины',   url: `${BASE}/Irina/landing-irina.html`, role: 'public', copy: true },
    ]
  },
  {
    id: 'tools', name: 'Инструменты', icon: '🔧', status: 'live',
    links: [
      { name: 'Этот сейф ссылок',    url: `${BASE}/dashboard.html`,   role: 'admin', copy: true },
      { name: 'Supabase (все проекты)', url: 'https://supabase.com/dashboard/project/qwoepdibvmwqgkkaabba', role: 'admin', copy: true },
    ]
  },
];

const STATUS_LABELS = { live: ['Работает', 'st-live'], dev: ['В работе', 'st-dev'], broken: ['Сломано', 'st-broken'] };
const ROLE_LABELS = { admin: ['Админ', 'role-admin'], master: ['Мастер', 'role-master'], public: ['Публичное', 'role-public'], dev: ['Разработка', 'role-dev'] };

let activeFilter = 'all';

// ── GATE ─────────────────────────────────────────────────
document.getElementById('enter').addEventListener('click', async () => {
  const pwd = document.getElementById('pwd').value;
  const h = await sha256(pwd);
  if (h !== ADMIN_HASH) {
    const err = document.getElementById('gateErr');
    err.textContent = 'Неверный ключ';
    err.style.display = 'block';
    return;
  }
  sessionStorage.setItem(LS_KEY, '1');
  show();
});
document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('enter').click();
});
if (sessionStorage.getItem(LS_KEY)) show();

// ── MAIN ─────────────────────────────────────────────────
function show() {
  document.getElementById('gate').style.display = 'none';
  const main = document.getElementById('main');
  main.style.display = 'block';
  render();
}

function render() {
  const main = document.getElementById('main');

  const filtersHtml = ['all', 'admin', 'master', 'public'].map(f => {
    const label = f === 'all' ? 'Все' : (ROLE_LABELS[f] || [f])[0];
    return `<button class="filter-btn ${activeFilter === f ? 'on' : ''}" data-filter="${f}">${label}</button>`;
  }).join('');

  const projectsHtml = PROJECTS.map(proj => {
    const [stLabel, stCls] = STATUS_LABELS[proj.status] || ['—', ''];
    const filteredLinks = proj.links.filter(l => activeFilter === 'all' || l.role === activeFilter);
    if (!filteredLinks.length) return '';

    const linksHtml = filteredLinks.map(l => {
      const [rLabel, rCls] = ROLE_LABELS[l.role] || ['—', ''];
      const isAbsolute = l.url.startsWith('http');
      const href = isAbsolute ? l.url : l.url;
      return `
        <div class="link-row">
          <div class="link-name">${esc(l.name)}</div>
          <div class="link-url"><a href="${esc(href)}" target="_blank">${esc(l.url)}</a></div>
          <span class="link-role ${rCls}">${rLabel}</span>
          ${l.copy ? `<button class="copy-btn" data-url="${esc(l.url)}" title="Скопировать">📋</button>` : '<div style="width:32px"></div>'}
        </div>
        ${l.note ? `<div class="note">${esc(l.note)}</div>` : ''}
      `;
    }).join('');

    return `
      <div class="project">
        <div class="project__hdr">
          <span class="project__icon">${proj.icon}</span>
          <span class="project__name">${esc(proj.name)}</span>
          <span class="project__status ${stCls}">${stLabel}</span>
        </div>
        ${linksHtml}
      </div>
    `;
  }).join('');

  main.innerHTML = `
    <div class="hdr">
      <div>
        <h1>Сейф ссылок</h1>
        <div class="hdr__sub">Все проекты Нейро Бабки СССР · обновлено 16.04.2026</div>
      </div>
      <button class="logout" id="logout">Выйти</button>
    </div>
    <div class="filters" id="filters">${filtersHtml}</div>
    ${projectsHtml}
    <footer>Нейро Бабки СССР · Сейф ссылок · только для команды</footer>
  `;

  // Bind filters
  main.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      render();
    });
  });

  // Bind copy buttons
  main.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(btn.dataset.url).then(() => {
        btn.classList.add('ok');
        btn.textContent = '✓';
        setTimeout(() => { btn.classList.remove('ok'); btn.textContent = '📋'; }, 1500);
      });
    });
  });

  // Bind logout
  document.getElementById('logout').addEventListener('click', () => {
    sessionStorage.removeItem(LS_KEY);
    location.reload();
  });
}
</script>
</body>
</html>
