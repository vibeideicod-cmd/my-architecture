# irina.stydiyatsi.ru
# Визитка Ирины Цепаевой (зеркало inna.ideidlyabiznesa1913.ru на Zarek).
# Статика, отдаём напрямую из /var/www/irina-stydiyatsi/.

server {
    server_name irina.stydiyatsi.ru;

    root /var/www/irina-stydiyatsi;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    access_log /var/log/nginx/irina-stydiyatsi.access.log;
    error_log /var/log/nginx/irina-stydiyatsi.error.log;

    # SSL — certbot пропишет автоматически при первом выпуске:
    #   certbot --nginx -d irina.stydiyatsi.ru -m inirstudiy@gmail.com --agree-tos --no-eff-email
    listen 80;
    listen [::]:80;
}
