# crm.stydiyatsi.ru
# CRM Студии (Иринин клон «Моей базы клиентов»)
# Proxy на локальный Python-сервис irina-crm (порт 3015).

server {
    server_name crm.stydiyatsi.ru;

    location / {
        proxy_pass http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3015/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/crm-stydiyatsi.access.log;
    error_log /var/log/nginx/crm-stydiyatsi.error.log;

    # SSL — certbot пропишет автоматически при первом выпуске:
    #   certbot --nginx -d crm.stydiyatsi.ru -m inirstudiy@gmail.com --agree-tos --no-eff-email
    listen 80;
    listen [::]:80;
}
