<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Скоро откроется</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0a0a0a;
    color: #e8e0d8;
    font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 5vw, 60px);
    line-height: 1.5;
    overflow-x: hidden;
  }
  .wrap {
    max-width: 640px;
    width: 100%;
    text-align: center;
  }
  .accent {
    display: inline-block;
    width: 64px;
    height: 4px;
    background: #e86c3a;
    border-radius: 2px;
    margin-bottom: clamp(28px, 4vw, 40px);
  }
  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(40px, 7vw, 72px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: clamp(16px, 2vw, 24px);
  }
  h1 .orange { color: #e86c3a; }
  p.lead {
    font-size: clamp(16px, 2vw, 19px);
    color: #b8b0a8;
    margin-bottom: clamp(36px, 5vw, 48px);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }
  a.home {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    background: transparent;
    color: #e86c3a;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.02em;
    border: 1.5px solid #e86c3a;
    border-radius: 6px;
    transition: background 0.2s, color 0.2s;
  }
  a.home:hover, a.home:focus { background: #e86c3a; color: #0a0a0a; }
  a.home::after { content: '→'; font-size: 18px; line-height: 1; }
  .footer {
    margin-top: clamp(48px, 7vw, 72px);
    font-size: 13px;
    color: #6a665e;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<main class="wrap">
  <div class="accent" aria-hidden="true"></div>
  <h1>Скоро <span class="orange">откроется</span></h1>
  <p class="lead">Идёт сборка. Эта страница станет доступна в ближайшие дни.</p>
  <a class="home" href="https://ideidlyabiznesa1913.ru">На главную</a>
  <div class="footer">ideidlyabiznesa1913.ru</div>
</main>
</body>
</html>
