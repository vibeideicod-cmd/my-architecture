# crm.ideidlyabiznesa1913.ru
# Этап 3 — CRM MVP proxy на локальный Python-сервис.

server {
    server_name crm.ideidlyabiznesa1913.ru;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:3005/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/crm.access.log;
    error_log /var/log/nginx/crm.error.log;

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/inna.ideidlyabiznesa1913.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/inna.ideidlyabiznesa1913.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = crm.ideidlyabiznesa1913.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name crm.ideidlyabiznesa1913.ru;
    return 404; # managed by Certbot


}
