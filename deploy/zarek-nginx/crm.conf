# crm.ideidlyabiznesa1913.ru
# Этап 1 — заглушка 503. Будет наполнено на соответствующем Этапе.

server {
    listen 80;
    listen [::]:80;
    server_name crm.ideidlyabiznesa1913.ru;

    error_page 503 /503.html;
    location = /503.html {
        root /var/www/_503;
        internal;
    }
    location / {
        return 503;
    }

    access_log /var/log/nginx/crm.access.log;
    error_log /var/log/nginx/crm.error.log;
}

# После Этапа 1 (SSL получен) — раскомментировать HTTPS-блок аналогично inna.conf
