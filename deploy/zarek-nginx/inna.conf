# inna.ideidlyabiznesa1913.ru — статика-визитка Инны
# Этап 2 — наполнение. Этап 1 — заглушка 503.

server {
    listen 80;
    listen [::]:80;
    server_name inna.ideidlyabiznesa1913.ru;

    # Stage 1: показываем «Скоро откроется» через 503
    error_page 503 /503.html;
    location = /503.html {
        root /var/www/_503;
        internal;
    }
    location / {
        return 503;
    }

    access_log /var/log/nginx/inna.access.log;
    error_log /var/log/nginx/inna.error.log;
}

