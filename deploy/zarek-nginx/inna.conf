# inna.ideidlyabiznesa1913.ru — статика-визитка Инны
# Этап 2 — наполнение. Этап 1 — заглушка 503.

server {
    server_name inna.ideidlyabiznesa1913.ru;

    # Stage 1: показываем «Скоро откроется» через 503
    error_page 503 /503.html;
    location = /503.html {
        root /var/www/_503;
        internal;
    }
    location / {
        return 503;
    }

    access_log /var/log/nginx/inna.access.log;
    error_log /var/log/nginx/inna.error.log;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/inna.ideidlyabiznesa1913.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/inna.ideidlyabiznesa1913.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

