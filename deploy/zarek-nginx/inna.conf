server {
    if ($host = inna.ideidlyabiznesa1913.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name inna.ideidlyabiznesa1913.ru;
    return 404; # managed by Certbot


}