# demo.ideidlyabiznesa1913.ru — НЕ АКТИВИРОВАН на Этапе 1
# Сейчас demo.* живёт на Beget shared (icepaeqw_demo).
# Этот конфиг готов к Этапу 6 — переезд demo.* с Beget shared на Model Zarek.
# Не делать симлинк в sites-enabled/, пока не выполнен Этап 6.

server {
    listen 80;
    listen [::]:80;
    server_name demo.ideidlyabiznesa1913.ru;

    error_page 503 /503.html;
    location = /503.html {
        root /var/www/_503;
        internal;
    }
    location / {
        return 503;
    }

    access_log /var/log/nginx/demo.access.log;
    error_log /var/log/nginx/demo.error.log;
}
